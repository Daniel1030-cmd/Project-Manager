<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>관리 시스템</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background: #2c3e50;
        color: #fff;
        padding-top: 20px;
    }

    .sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar li {
        padding: 15px 20px;
        cursor: pointer;
        transition: 0.2s;
    }

    .sidebar li:hover {
        background: #34495e;
    }

    .sidebar li.active {
        background: #1abc9c;
        font-weight: bold;
    }

    /* Content */
    .content {
        flex: 1;
        padding: 20px;
        background: #f5f6fa;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">대시보드</li>
        <li data-page="project">프로젝트 관리</li>
        <li data-page="schedule">일정 관리</li>
        <li data-page="supplier">공급업체 관리</li>
        <li data-page="issue">이슈 관리</li>
    </ul>
</div>

<div class="content" id="content">
    <!-- 기본 화면 -->
</div>

<script>
    // 페이지별 콘텐츠 정의
    const pages = {
        dashboard: `
            <div class="card">
                <h2>대시보드</h2>
                <p>전체 현황을 확인할 수 있습니다.</p>
            </div>
        `,
        project: `
            <div class="card">
                <h2>프로젝트 관리</h2>
                <p>프로젝트 생성 및 진행 상태를 관리합니다.</p>
            </div>
        `,
        schedule: `
            <div class="card">
                <h2>일정 관리</h2>
                <p>일정 및 캘린더를 관리합니다.</p>
            </div>
        `,
        supplier: `
            <div class="card">
                <h2>공급업체 관리</h2>
                <p>협력 업체 정보를 관리합니다.</p>
            </div>
        `,
        issue: `
            <div class="card">
                <h2>이슈 관리</h2>
                <p>발생한 이슈를 추적하고 처리합니다.</p>
            </div>
        `
    };

    const menuItems = document.querySelectorAll(".sidebar li");
    const content = document.getElementById("content");

    // 렌더 함수
    function renderPage(page) {
        content.innerHTML = pages[page] || "<div class='card'>페이지 없음</div>";
    }

    // active 처리
    function setActive(el) {
        menuItems.forEach(item => item.classList.remove("active"));
        el.classList.add("active");
    }

    // 이벤트 등록
    menuItems.forEach(item => {
        item.addEventListener("click", () => {
            const page = item.dataset.page;
            setActive(item);
            renderPage(page);
        });
    });

    // 초기 화면
    window.addEventListener("DOMContentLoaded", () => {
        const first = menuItems[0];
        setActive(first);
        renderPage(first.dataset.page);
    });
</script>

</body>
</html>
