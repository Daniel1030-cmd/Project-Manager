<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enterprise PMO System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f5f6fa;
}

.sidebar {
    width:240px;
    background:#1e2a44;
    color:white;
    padding-top:20px;
}

.sidebar li {
    padding:14px 18px;
    cursor:pointer;
}
.sidebar li:hover { background:#2c3f66; }
.sidebar li.active { background:#00b894; }

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
}

th { background:#f1f2f6; }

button {
    padding:6px 10px;
    margin:2px;
    cursor:pointer;
}

/* GANTT */
.gantt {
    background:white;
    padding:15px;
    border-radius:10px;
}

.gantt-row {
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.gantt-label {
    width:160px;
    font-size:13px;
}

.gantt-track {
    flex:1;
    height:18px;
    background:#eee;
    position:relative;
    border-radius:6px;
}

.gantt-bar {
    position:absolute;
    height:100%;
    background:#3498db;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">Dashboard</li>
        <li data-page="site">Site</li>
        <li data-page="project">Project</li>
        <li data-page="gantt">Gantt</li>
        <li data-page="issue">Issue</li>
        <li data-page="workflow">Workflow</li>
        <li data-page="log">Audit Log</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= COLLECTION ================= */
const sitesCol = collection(db, "sites");
const projectsCol = collection(db, "projects");
const tasksCol = collection(db, "tasks");
const issuesCol = collection(db, "issues");

/* ================= STATE ================= */
let sites = [];
let projects = [];
let tasks = [];
let issues = [];

const content = document.getElementById("content");
const menuItems = document.querySelectorAll(".sidebar li");

/* ================= REALTIME ================= */
onSnapshot(sitesCol, s => sites = s.docs.map(d => ({ id:d.id, ...d.data() })));
onSnapshot(projectsCol, s => projects = s.docs.map(d => ({ id:d.id, ...d.data() })));
onSnapshot(tasksCol, s => { tasks = s.docs.map(d => ({ id:d.id, ...d.data() })); render(currentPage); });
onSnapshot(issuesCol, s => { issues = s.docs.map(d => ({ id:d.id, ...d.data() })); render(currentPage); });

/* ================= USER MOCK ================= */
const user = "PM-USER";

/* ================= ISSUE ================= */
window.addIssue = async () => {
    const title = prompt("Issue Title");
    if(!title) return;

    await addDoc(issuesCol, {
        title,
        status:"New",
        createdBy:user,
        createdAt:serverTimestamp(),
        log:[{
            time:new Date().toLocaleString(),
            action:"Created",
            by:user
        }]
    });
};

window.move = async (id, status) => {
    const issue = issues.find(i => i.id === id);

    await updateDoc(doc(db,"issues",id), {
        status,
        log:[...issue.log, {
            time:new Date().toLocaleString(),
            action:status,
            by:user
        }]
    });
};

/* ================= TASK ================= */
window.addTask = async () => {
    const name = prompt("Task Name");
    if(!name) return;

    await addDoc(tasksCol, {
        name,
        start:0,
        duration:10,
        progress:0,
        createdBy:user
    });
};

/* ================= GANTT ================= */
function drawGantt(task, index) {
    return `
        <div class="gantt-row">
            <div class="gantt-label">
                ${task.name} (${task.progress || 0}%)
            </div>

            <div class="gantt-track">
                <div class="gantt-bar"
                    style="left:${task.start*10}px;width:${task.duration*10}px">
                </div>
            </div>
        </div>
    `;
}

/* ================= RENDER ================= */
let currentPage = "dashboard";

function render(page) {
    currentPage = page;

    /* DASHBOARD */
    if(page === "dashboard") {
        content.innerHTML = `
            <div class="card"><h2>📊 PMO Dashboard</h2></div>
            <div class="card">Sites: ${sites.length}</div>
            <div class="card">Tasks: ${tasks.length}</div>
            <div class="card">Issues: ${issues.length}</div>
        `;
    }

    /* SITE */
    else if(page === "site") {
        content.innerHTML = `
            <div class="card"><h2>🏗 Site Master</h2></div>

            <table>
                <tr><th>ID</th><th>Name</th><th>Status</th></tr>
                ${sites.map(s => `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name || "-"}</td>
                        <td>${s.status || "-"}</td>
                    </tr>
                `).join("")}
            </table>
        `;
    }

    /* PROJECT */
    else if(page === "project") {
        content.innerHTML = `
            <div class="card">
                <h2>📁 Project Tasks</h2>
                <button onclick="addTask()">+ Task</button>
            </div>

            ${tasks.map(t => `
                <div class="card">
                    <b>${t.name}</b><br/>
                    Progress: ${t.progress || 0}%
                </div>
            `).join("")}
        `;
    }

    /* GANTT */
    else if(page === "gantt") {
        content.innerHTML = `
            <div class="card"><h2>📅 Gantt Chart</h2></div>
            <div class="gantt">
                ${tasks.map(drawGantt).join("")}
            </div>
        `;
    }

    /* ISSUE */
    else if(page === "issue") {
        content.innerHTML = `
            <div class="card">
                <h2>📥 Issues</h2>
                <button onclick="addIssue()">+ Issue</button>
            </div>

            ${issues.map(i => `
                <div class="card">
                    <b>${i.title}</b><br/>
                    Status: ${i.status}<br/>
                    CreatedBy: ${i.createdBy || "-"}
                </div>
            `).join("")}
        `;
    }

    /* WORKFLOW */
    else if(page === "workflow") {
        content.innerHTML = `
            <div class="card"><h2>🔄 Workflow</h2></div>

            ${issues.map(i => `
                <div class="card">
                    ${i.title}<br/>
                    ${i.status}<br/><br/>

                    <button onclick="move('${i.id}','Assigned')">Assign</button>
                    <button onclick="move('${i.id}','Analyzing')">Analyze</button>
                    <button onclick="move('${i.id}','Resolved')">Resolve</button>
                    <button onclick="move('${i.id}','Closed')">Close</button>
                </div>
            `).join("")}
        `;
    }

    /* LOG */
    else if(page === "log") {
        content.innerHTML = `
            <div class="card"><h2>🧾 Audit Log</h2></div>

            ${issues.map(i => `
                <div class="card">
                    <b>${i.title}</b>
                    <pre>${JSON.stringify(i.log || [], null, 2)}</pre>
                </div>
            `).join("")}
        `;
    }
}

/* ================= MENU ================= */
menuItems.forEach(m => {
    m.onclick = () => {
        menuItems.forEach(i => i.classList.remove("active"));
        m.classList.add("active");
        render(m.dataset.page);
    };
});

/* INIT */
menuItems[0].classList.add("active");
render("dashboard");

</script>

</body>
</html>
