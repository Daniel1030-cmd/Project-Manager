<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMO System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f5f6fa;
}

.sidebar {
    width:260px;
    background:#1e2a44;
    color:white;
    padding-top:20px;
}

.sidebar li {
    padding:14px;
    cursor:pointer;
}

.sidebar li:hover { background:#2c3f66; }
.sidebar li.active { background:#00b894; }

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
}

th { background:#f1f2f6; }

button {
    padding:5px 10px;
    margin:2px;
    cursor:pointer;
}

/* GANTT */
.gantt-row {
    display:flex;
    margin-bottom:8px;
}

.gantt-label {
    width:200px;
}

.gantt-track {
    flex:1;
    height:14px;
    background:#eee;
    position:relative;
}

.gantt-bar {
    position:absolute;
    height:100%;
    background:#3498db;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">Dashboard</li>
        <li data-page="site">Site</li>
        <li data-page="project">Project</li>
        <li data-page="statistics">Statistics</li>
        <li data-page="issue">Issue</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBouCzxzCSpmCdVqVp9-h3zSR-jps4bNtM",
  authDomain: "project-manager-79e25.firebaseapp.com",
  projectId: "project-manager-79e25",
  storageBucket: "project-manager-79e25.firebasestorage.app",
  messagingSenderId: "808738416305",
  appId: "1:808738416305:web:b366ad2258471790852490"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= COLLECTION ================= */
const siteCol = collection(db, "site");
const taskCol = collection(db, "tasks");
const issueCol = collection(db, "issues");

/* ================= STATE ================= */
let site = [];
let tasks = [];
let issues = [];
let current = "dashboard";

const content = document.getElementById("content");
const menu = document.querySelectorAll(".sidebar li");

const user = "PM";

/* ================= REALTIME ================= */
onSnapshot(siteCol, snap => {
    site = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render(current);
});

onSnapshot(taskCol, snap => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render(current);
});

onSnapshot(issueCol, snap => {
    issues = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render(current);
});

/* ================= SITE CREATE ================= */
window.addSite = async function () {

    try {

        const name = prompt("현장명");
        if(!name) return;

        const client = prompt("고객사");
        const equipment = prompt("장비");
        const quantity = prompt("수량");
        const contractType = prompt("계약타입");
        const contractStart = prompt("계약일자");
        const contractEnd = prompt("계약종료");
        const maintenancePeriod = prompt("유지보수 기간");
        const pm = prompt("PM");

        const docRef = await addDoc(siteCol, {
            name,
            client,
            equipment,
            quantity,
            contractType,
            contractStart,
            contractEnd,
            maintenancePeriod,
            pm,
            status: "준비",
            risk: "Low",
            createdAt: serverTimestamp()
        });

        console.log("저장 성공:", docRef.id);
        alert("저장 완료");

    } catch(err) {

        console.error(err);
        alert("저장 실패");

    }
};
    window.updateSiteStatus = async function(id, status) {

    try {

        await updateDoc(
            doc(db,"site",id),
            {
                status: status
            }
        );

        alert("상태 변경 완료");

    } catch(err) {

        console.error(err);
        alert("상태 변경 실패");

    }

};
window.updateIssueStatus = async function(id,status){

    try{

        await updateDoc(
            doc(db,"issues",id),
            {
                status:status
            }
        );

        alert("이슈 상태 변경 완료");

    }catch(err){

        console.error(err);

        alert("상태 변경 실패");

    }

};
/* ================= TASK ================= */
window.addProject = async function(){

    const siteName = prompt("현장명");
    if(!siteName) return;


    const receiptDate = prompt("접수일자 YYYY-MM-DD");

    const symptom = prompt("접수증상");

    const manager = prompt("담당자");

    const phone = prompt("연락처");

    const pm = prompt("담당PM");


    await addDoc(taskCol,{

        siteName,
        receiptDate,
        symptom,
        manager,
        phone,
        pm,

        status:"접수",

        createdAt:serverTimestamp(),

        completedAt:null,

        processTime:0

    });


    alert("Project 등록 완료");

};
window.completeProject = async function(id){

    try {

        // 현재 데이터 찾기
        const target = tasks.find(t => t.id === id);


        if(!target){
            alert("데이터 없음");
            return;
        }


        let startTime;


        if(target.createdAt){

            startTime = target.createdAt.toDate();

        }
        else{

            startTime = new Date();

        }



        const endTime = new Date();



        // 시간 차이 계산
        const diffHour =
        Math.round(
            (endTime - startTime)
            /
            (1000*60*60)
        );



        await updateDoc(
            doc(db,"tasks",id),
            {


                status:"완료",


                completedAt:
                serverTimestamp(),


                processTime:
                diffHour

            }
        );



        alert(
            "완료 처리됨\n처리시간 : "
            +diffHour+" 시간"
        );


    }
    catch(err){

        console.error(err);

        alert("완료 처리 실패");

    }

};
    
/* ================= ISSUE ================= */
window.addIssue = async function () {

    try {

        const siteName = prompt("현장명");
        if(!siteName) return;

        const type = prompt(
`유형 입력

기술
일정
자재
고객`
        );

        const content = prompt("이슈 내용");

        const writer = prompt("등록자");

        await addDoc(issueCol, {

            siteName,
            type,
            content,
            writer,

            status : "Open",

            createdAt : serverTimestamp()

        });

        alert("이슈 등록 완료");

    } catch(err){

        console.error(err);

        alert("등록 실패");

    }

}

/* ================= KPI ================= */
function kpi() {
    const closed = issues.filter(i => i.status === "Closed").length;
    return {
        total: issues.length,
        rate: issues.length ? (closed/issues.length*100).toFixed(1) : 0
    };
}

/* ================= GANTT ================= */
function ganttRow(t) {
    return `
        <div class="gantt-row">
            <div class="gantt-label">${t.name}</div>
            <div class="gantt-track">
                <div class="gantt-bar"
                style="left:${(t.start||0)*10}px;width:${(t.duration||10)*10}px"></div>
            </div>
        </div>
    `;
}

/* ================= RENDER ================= */
function render(page) {
    current = page;

    if(page === "dashboard") {
        const k = kpi();
        content.innerHTML = `
            <div class="card"><h2>PMO Dashboard</h2></div>
            <div class="card">Site: ${site.length}</div>
            <div class="card">Tasks: ${tasks.length}</div>
            <div class="card">Issues: ${issues.length}</div>
            <div class="card">Close Rate: ${k.rate}%</div>
        `;
    }

   else if(page === "site") {
    content.innerHTML = `
        <div class="card">
            <h2>Site Master</h2>
            <button onclick="addSite()">+ Site</button>
        </div>

        <div class="card">
            <table>
                <tr>
                    <th>현장명</th>
                    <th>고객사</th>
                    <th>장비</th>
                    <th>수량</th>
                    <th>계약타입</th>
                    <th>계약일자</th>
                    <th>계약종료</th>
                    <th>유지보수기간</th>
                    <th>PM</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

                ${site.map(s => `
                    <tr>
                        <td>${s.name || ""}</td>
                        <td>${s.client || ""}</td>
                        <td>${s.equipment || ""}</td>
                        <td>${s.quantity || ""}</td>
                        <td>${s.contractType || ""}</td>
                        <td>${s.contractStart || ""}</td>
                        <td>${s.contractEnd || ""}</td>
                        <td>${s.maintenancePeriod || ""}</td>
                        <td>${s.pm || ""}</td>
                        <td>${s.status || ""}</td>
                        <td>
                            <button onclick="updateSiteStatus('${s.id}','진행')">
                                진행
                            </button>

                            <button onclick="updateSiteStatus('${s.id}','만료')">
                                만료
                            </button>
                        </td>
                    </tr>
                `).join("")}
            </table>
        </div>
    `;
}

    else if(page==="project"){


let total = tasks.length;


let complete =
tasks.filter(
t=>t.status==="완료"
).length;



let avg =
tasks.length
?
(
tasks.reduce(
(a,b)=>a+(b.processTime||0)
,0)
/tasks.length
).toFixed(1)
:0;



content.innerHTML=`

<div class="card">

<h2>Project 접수관리</h2>

<button onclick="addProject()">
+ 접수등록
</button>


</div>



<div class="card">


<h3>자동 집계</h3>


<p>
전체 접수 건수 :
<b>${total}</b>
</p>


<p>
처리 완료 건수 :
<b>${complete}</b>
</p>


<p>
전체 평균 처리시간 :
<b>${avg} 시간</b>
</p>


</div>



<div class="card">


<table>


<tr>

<th>현장명</th>
<th>접수일</th>
<th>증상</th>
<th>담당자</th>
<th>연락처</th>
<th>PM</th>
<th>상태</th>
<th>처리시간</th>
<th>Action</th>

</tr>



${tasks.map(t=>`

<tr>


<td>${t.siteName||""}</td>

<td>${t.receiptDate||""}</td>

<td>${t.symptom||""}</td>

<td>${t.manager||""}</td>

<td>${t.phone||""}</td>

<td>${t.pm||""}</td>


<td>
${t.status||""}
</td>


<td>
${t.processTime||0} h
</td>



<td>


${
t.status!=="완료"

?

`
<button onclick="completeProject('${t.id}')">
완료
</button>
`

:

"완료됨"

}


</td>



</tr>


`).join("")}



</table>

</div>


`;

}

else if(page==="statistics"){

    content.innerHTML = `
        <div class="card">
            <h2>Statistics</h2>
            <p>통계 기능 준비중</p>
        </div>
    `;

}


function filterData(type){


    const now=new Date();


    return tasks.filter(t=>{


        const d=getDate(t.createdAt);

        if(!d) return false;



        if(type==="day"){

            return d.toDateString()
            ===now.toDateString();

        }



        if(type==="week"){


            const one =
            new Date(
            now.getFullYear(),
            now.getMonth(),
            now.getDate()-7
            );


            return d>=one;

        }



        if(type==="month"){


            return (
            d.getMonth()
            ===now.getMonth()
            &&
            d.getFullYear()
            ===now.getFullYear()
            );

        }



    });


}




function completeCount(data){

return data.filter(
x=>x.status==="완료"
).length;

}




function avgTime(data){

if(data.length===0)
return 0;


return (

data.reduce(
(a,b)=>
a+(b.processTime||0)
,0)

/

data.length

).toFixed(1);


}





let day =
filterData("day");


let week =
filterData("week");


let month =
filterData("month");





/* 현장별 통계 */

let siteMap={};



tasks.forEach(t=>{


const name=t.siteName||"미등록";


if(!siteMap[name]){


siteMap[name]={

total:0,

complete:0,

time:0

};


}



siteMap[name].total++;



if(t.status==="완료")
siteMap[name].complete++;



siteMap[name].time +=
t.processTime||0;



});





content.innerHTML=`

<div class="card">


<h2>
Project Statistics
</h2>


</div>





<div class="card">


<h3>
Period Analysis
</h3>


<table>


<tr>

<th>Period</th>

<th>Received</th>

<th>Completed</th>

<th>Avg Process Time</th>


</tr>




<tr>

<td>Daily</td>

<td>${day.length}</td>

<td>${completeCount(day)}</td>

<td>${avgTime(day)} h</td>


</tr>




<tr>

<td>Weekly</td>

<td>${week.length}</td>

<td>${completeCount(week)}</td>

<td>${avgTime(week)} h</td>


</tr>




<tr>

<td>Monthly</td>

<td>${month.length}</td>

<td>${completeCount(month)}</td>

<td>${avgTime(month)} h</td>


</tr>



</table>


</div>







<div class="card">


<h3>
Site Performance
</h3>



<table>


<tr>

<th>Site</th>

<th>Total</th>

<th>Completed</th>

<th>Avg Time</th>

</tr>




${
Object.keys(siteMap)
.map(k=>{


let s=siteMap[k];


return `

<tr>

<td>${k}</td>

<td>${s.total}</td>

<td>${s.complete}</td>

<td>

${
(s.time/s.total).toFixed(1)
}

h

</td>


</tr>


`;

})
.join("")

}



</table>


</div>


`;

}

    else if(page === "issue") {

content.innerHTML = `

<div class="card">

<h2>Issue Management</h2>

<button onclick="addIssue()">
+ Issue 등록
</button>

</div>

<div class="card">

<table>

<tr>
<th>현장명</th>
<th>유형</th>
<th>이슈내용</th>
<th>등록자</th>
<th>상태</th>
<th>Action</th>
</tr>

${issues.map(i => `

<tr>

<td>${i.siteName || ""}</td>

<td>${i.type || ""}</td>

<td>${i.content || ""}</td>

<td>${i.writer || ""}</td>

<td>${i.status || ""}</td>

<td>

<button onclick="updateIssueStatus('${i.id}','In Progress')">
진행
</button>

<button onclick="updateIssueStatus('${i.id}','Closed')">
완료
</button>

</td>

</tr>

`).join("")}

</table>

</div>

    `;

}
/* ================= MENU ================= */
menu.forEach(m => {
    m.onclick = () => {
        menu.forEach(x => x.classList.remove("active"));
        m.classList.add("active");
        render(m.dataset.page);
    };
});

/* INIT */
menu[0].classList.add("active");
render("dashboard");

</script>

</body>
</html>
