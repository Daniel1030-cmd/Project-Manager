<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Management System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #1f2a44;
    color: #fff;
    padding-top: 20px;
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.sidebar li {
    padding: 14px 18px;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar li:hover {
    background: #2f3f66;
}

.sidebar li.active {
    background: #00b894;
    font-weight: bold;
}

/* Content */
.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.card {
    background: white;
    padding: 16px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 15px;
}

/* KPI */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

.kpi {
    background: white;
    padding: 14px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.kpi h3 {
    margin: 0;
    font-size: 14px;
    color: #666;
}

.kpi p {
    margin: 8px 0 0;
    font-size: 20px;
    font-weight: bold;
}

/* Gantt Chart */
.gantt {
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.gantt-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.gantt-label {
    width: 140px;
    font-size: 13px;
}

.gantt-bar-container {
    flex: 1;
    height: 18px;
    background: #ecf0f1;
    border-radius: 6px;
    position: relative;
}

.gantt-bar {
    height: 100%;
    background: #3498db;
    border-radius: 6px;
    position: absolute;
}

/* status */
.badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 12px;
    background: #dfe6e9;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">대시보드</li>
        <li data-page="gantt">간트차트</li>
        <li data-page="project">프로젝트</li>
        <li data-page="schedule">일정</li>
        <li data-page="issue">이슈</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script>
const menuItems = document.querySelectorAll(".sidebar li");
const content = document.getElementById("content");

/* -----------------------------
   프로젝트 데이터 (실무형 구조)
----------------------------- */
const projects = [
    { name: "ERP 시스템 개발", start: 0, duration: 40 },
    { name: "모바일 앱", start: 10, duration: 30 },
    { name: "CRM 구축", start: 20, duration: 25 },
    { name: "API 통합", start: 35, duration: 20 }
];

/* -----------------------------
   페이지 렌더링
----------------------------- */
function render(page) {

    if(page === "dashboard") {
        content.innerHTML = `
            <div class="card"><h2>📊 프로젝트 대시보드</h2></div>

            <div class="kpi-grid">
                <div class="kpi"><h3>전체 프로젝트</h3><p>12</p></div>
                <div class="kpi"><h3>진행중</h3><p>5</p></div>
                <div class="kpi"><h3>완료</h3><p>7</p></div>
                <div class="kpi"><h3>이슈</h3><p>3</p></div>
            </div>

            <div class="card">
                <h3>📈 진행률 추이</h3>

                ${``}
            </div>
        `;
    }

    else if(page === "gantt") {
        let ganttHTML = projects.map(p => {
            const left = p.start * 10;
            const width = p.duration * 10;

            return `
                <div class="gantt-row">
                    <div class="gantt-label">${p.name}</div>
                    <div class="gantt-bar-container">
                        <div class="gantt-bar" style="left:${left}px;width:${width}px;"></div>
                    </div>
                </div>
            `;
        }).join("");

        content.innerHTML = `
            <div class="card"><h2>📅 간트차트 (Gantt Chart)</h2></div>
            <div class="gantt">
                ${ganttHTML}
            </div>
        `;
    }

    else if(page === "project") {
        content.innerHTML = `
            <div class="card"><h2>📁 프로젝트 관리</h2></div>

            <div class="card">
                <p><span class="badge">ACTIVE</span> ERP 시스템 개발</p>
                <p><span class="badge">ACTIVE</span> 모바일 앱</p>
                <p><span class="badge">DONE</span> CRM 구축</p>
            </div>
        `;
    }

    else if(page === "schedule") {
        content.innerHTML = `
            <div class="card"><h2>🗓 일정 관리</h2></div>
            <div class="card">
                <p>• 월간 회의: 매주 월요일</p>
                <p>• 개발 리뷰: 매주 수요일</p>
                <p>• QA 점검: 매주 금요일</p>
            </div>
        `;
    }

    else if(page === "issue") {
        content.innerHTML = `
            <div class="card"><h2>⚠ 이슈 관리</h2></div>
            <div class="card">
                <p>🔴 API 지연 문제</p>
                <p>🟡 UI 버그 수정 진행중</p>
                <p>🟢 서버 안정화 완료</p>
            </div>
        `;
    }
}

/* -----------------------------
   active 처리
----------------------------- */
function setActive(el) {
    menuItems.forEach(i => i.classList.remove("active"));
    el.classList.add("active");
}

/* -----------------------------
   이벤트
----------------------------- */
menuItems.forEach(item => {
    item.addEventListener("click", () => {
        setActive(item);
        render(item.dataset.page);
    });
});

/* 초기 실행 */
setActive(menuItems[0]);
render("dashboard");

</script>

</body>
</html>
