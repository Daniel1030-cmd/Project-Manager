<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enterprise PMO Core System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f5f6fa;
}

.sidebar {
    width:260px;
    background:#1e2a44;
    color:white;
    padding-top:20px;
}

.sidebar li {
    padding:14px 18px;
    cursor:pointer;
}

.sidebar li:hover { background:#2c3f66; }
.sidebar li.active { background:#00b894; }

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
}

th { background:#f1f2f6; }

button {
    padding:6px 10px;
    margin:2px;
    cursor:pointer;
}

/* GANTT */
.gantt {
    background:white;
    padding:15px;
    border-radius:10px;
}

.gantt-row {
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.gantt-label {
    width:220px;
    font-size:13px;
}

.gantt-track {
    flex:1;
    height:18px;
    background:#eee;
    position:relative;
    border-radius:6px;
}

.gantt-bar {
    position:absolute;
    height:100%;
    background:#3498db;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">Dashboard</li>
        <li data-page="site">Site</li>
        <li data-page="project">Project</li>
        <li data-page="gantt">Gantt</li>
        <li data-page="issue">Issue</li>
        <li data-page="analytics">Analytics</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">
window.addSite = async function () {

/* ================= FIREBASE ================= */
        const name = prompt("현장명");
    if(!name) return;

    const project = prompt("프로젝트명");
    const client = prompt("고객사");
    const location = prompt("위치 (국가/도시)");
    const pm = prompt("담당 PM");

    await addDoc(collection(db,"sites"), {
        name,
        project,
        client,
        location,
        pm,
        status:"준비",
        level:"Medium",
        risk:"Low",
        createdBy:user,
        createdAt:serverTimestamp()
    });
};

window.updateSiteStatus = async function(id, status) {

    const ref = doc(db,"sites",id);

    await updateDoc(ref, {
        status
    });
};
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= COLLECTIONS ================= */
const siteCol = collection(db, "sites");
const projectCol = collection(db, "projects");
const taskCol = collection(db, "tasks");
const issueCol = collection(db, "issues");

/* ================= STATE ================= */
let sites = [];
let projects = [];
let tasks = [];
let issues = [];

const content = document.getElementById("content");
const menu = document.querySelectorAll(".sidebar li");

/* ================= REALTIME ================= */
onSnapshot(siteCol, s => {
    sites = s.docs.map(d => ({ id:d.id, ...d.data() }));
});

onSnapshot(projectCol, s => {
    projects = s.docs.map(d => ({ id:d.id, ...d.data() }));
});

onSnapshot(taskCol, s => {
    tasks = s.docs.map(d => ({ id:d.id, ...d.data() }));
    render(current);
});

onSnapshot(issueCol, s => {
    issues = s.docs.map(d => ({ id:d.id, ...d.data() }));
    render(current);
});

/* ================= USER ================= */
const user = "PM-USER";

/* ================= ISSUE ================= */
window.addIssue = async () => {
    const title = prompt("Issue Title");
    if(!title) return;

    await addDoc(issueCol, {
        title,
        status:"New",
        siteId: sites[0]?.id || null,
        createdBy:user,
        createdAt:serverTimestamp(),
        history:[{
            action:"Created",
            by:user,
            time:new Date().toISOString()
        }]
    });
};

/* ================= TASK ================= */
window.addTask = async () => {
    const name = prompt("Task Name");
    if(!name) return;

    await addDoc(taskCol, {
        name,
        siteId: sites[0]?.id || null,
        start:0,
        duration:10,
        actualStart:null,
        actualEnd:null,
        progress:0,
        createdBy:user
    });
};

/* ================= ISSUE WORKFLOW ================= */
window.move = async (id, status) => {
    const issue = issues.find(i => i.id === id);

    await updateDoc(doc(db,"issues",id), {
        status,
        history:[...issue.history, {
            action:status,
            by:user,
            time:new Date().toISOString()
        }]
    });
};

/* ================= KPI ENGINE ================= */
function calcKPI() {
    const totalIssues = issues.length;
    const closed = issues.filter(i => i.status === "Closed").length;
    const critical = issues.filter(i => i.status === "Critical").length;

    return {
        totalIssues,
        closed,
        critical,
        resolutionRate: totalIssues ? (closed/totalIssues*100).toFixed(1) : 0
    };
}

/* ================= GANTT ================= */
function ganttRow(t) {
    const width = (t.duration || 10) * 12;
    const left = (t.start || 0) * 12;

    return `
        <div class="gantt-row">
            <div class="gantt-label">
                ${t.name}
            </div>

            <div class="gantt-track">
                <div class="gantt-bar"
                    style="left:${left}px;width:${width}px">
                </div>
            </div>
        </div>
    `;
}

/* ================= RENDER ================= */
let current = "dashboard";

function render(page) {
    current = page;

    /* DASHBOARD */
    if(page === "dashboard") {
        const kpi = calcKPI();

        content.innerHTML = `
            <div class="card"><h2>📊 PMO Dashboard</h2></div>

            <div class="card">Sites: ${sites.length}</div>
            <div class="card">Tasks: ${tasks.length}</div>
            <div class="card">Issues: ${issues.length}</div>

            <div class="card">
                Resolution Rate: ${kpi.resolutionRate}%
            </div>
        `;
    }

else if(page === "site") {

    content.innerHTML = `
        <div class="card">
            <h2>🏗 Site Master (PMO Control)</h2>
            <button onclick="addSite()">+ 현장 등록</button>
        </div>

        <div class="card">
            <table>
                <tr>
                    <th>ID</th>
                    <th>현장명</th>
                    <th>프로젝트</th>
                    <th>고객사</th>
                    <th>위치</th>
                    <th>상태</th>
                    <th>난이도</th>
                    <th>PM</th>
                    <th>리스크</th>
                    <th>Action</th>
                </tr>

                ${sites.map(s => `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name || "-"}</td>
                        <td>${s.project || "-"}</td>
                        <td>${s.client || "-"}</td>
                        <td>${s.location || "-"}</td>
                        <td>${s.status || "-"}</td>
                        <td>${s.level || "-"}</td>
                        <td>${s.pm || "-"}</td>
                        <td>${s.risk || "-"}</td>
                        <td>
                            <button onclick="updateSiteStatus('${s.id}','진행')">진행</button>
                            <button onclick="updateSiteStatus('${s.id}','보류')">보류</button>
                            <button onclick="updateSiteStatus('${s.id}','완료')">완료</button>
                        </td>
                    </tr>
                `).join("")}
            </table>
        </div>
    `;
}

    /* PROJECT */
    else if(page === "project") {
        content.innerHTML = `
            <div class="card">
                <h2>📁 Project Control</h2>
                <button onclick="addTask()">+ Task</button>
            </div>

            ${tasks.map(t => `
                <div class="card">
                    <b>${t.name}</b><br/>
                    Progress: ${t.progress || 0}%
                </div>
            `).join("")}
        `;
    }

    /* GANTT */
    else if(page === "gantt") {
        content.innerHTML = `
            <div class="card"><h2>📅 Gantt Analysis</h2></div>

            <div class="gantt">
                ${tasks.map(ganttRow).join("")}
            </div>
        `;
    }

    /* ISSUE */
    else if(page === "issue") {
        content.innerHTML = `
            <div class="card">
                <h2>📥 Issue Control</h2>
                <button onclick="addIssue()">+ Issue</button>
            </div>

            ${issues.map(i => `
                <div class="card">
                    <b>${i.title}</b><br/>
                    Status: ${i.status}<br/>
                    Site: ${i.siteId || "-"}
                </div>
            `).join("")}
        `;
    }

    /* ANALYTICS */
    else if(page === "analytics") {

        const bySite = sites.map(s => ({
            site:s.id,
            issues:issues.filter(i => i.siteId === s.id).length
        }));

        content.innerHTML = `
            <div class="card"><h2>📊 Analytics</h2></div>

            <div class="card">
                ${JSON.stringify(bySite, null, 2)}
            </div>
        `;
    }
}

/* ================= MENU ================= */
menu.forEach(m => {
    m.onclick = () => {
        menu.forEach(i => i.classList.remove("active"));
        m.classList.add("active");
        render(m.dataset.page);
    };
});

/* INIT */
menu[0].classList.add("active");
render("dashboard");

</script>

</body>
</html>
