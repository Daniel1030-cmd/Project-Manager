<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase Project Manager</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width:240px;
    background:#1e2a44;
    color:white;
    padding:20px 0;
}

.sidebar li {
    padding:14px 18px;
    cursor:pointer;
}

.sidebar li:hover { background:#2c3e66; }
.sidebar li.active { background:#00b894; }

/* CONTENT */
.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* GANTT */
.gantt {
    background:#fff;
    padding:15px;
    border-radius:10px;
}

.gantt-row {
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.gantt-label {
    width:160px;
    font-size:13px;
}

.gantt-track {
    flex:1;
    height:20px;
    background:#eee;
    position:relative;
    border-radius:6px;
}

.gantt-bar {
    position:absolute;
    height:100%;
    background:#3498db;
    border-radius:6px;
    cursor:grab;
}

/* FORM */
input, button {
    padding:8px;
    margin:5px 0;
}
button {
    cursor:pointer;
    background:#00b894;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">대시보드</li>
        <li data-page="gantt">간트차트</li>
        <li data-page="project">프로젝트</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">

/* ==============================
   FIREBASE INIT (여기 수정 필수)
============================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "projects");

/* ==============================
   STATE
============================== */
let projects = [];

const content = document.getElementById("content");
const menuItems = document.querySelectorAll(".sidebar li");

/* ==============================
   FIRESTORE LOAD
============================== */
async function loadProjects() {
    const snap = await getDocs(colRef);
    projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

/* ==============================
   CREATE PROJECT
============================== */
async function createProject(name) {
    await addDoc(colRef, {
        name,
        start: 0,
        duration: 10
    });
    await refresh();
}

/* ==============================
   UPDATE PROJECT
============================== */
async function updateProject(id, data) {
    const ref = doc(db, "projects", id);
    await updateDoc(ref, data);
}

/* ==============================
   REFRESH
============================== */
async function refresh() {
    await loadProjects();
    render(currentPage);
}

/* ==============================
   GANTT DRAG (Level 2)
============================== */
function enableDrag(bar, project) {
    let isDown = false;
    let startX = 0;

    bar.addEventListener("mousedown", (e) => {
        isDown = true;
        startX = e.clientX;
        bar.style.opacity = 0.7;
    });

    window.addEventListener("mousemove", (e) => {
        if(!isDown) return;

        const dx = Math.round((e.clientX - startX) / 10);

        project.start += dx;
        startX = e.clientX;

        render("gantt");
    });

    window.addEventListener("mouseup", async () => {
        if(isDown) {
            isDown = false;
            bar.style.opacity = 1;

            await updateProject(project.id, {
                start: project.start,
                duration: project.duration
            });
        }
    });
}

/* ==============================
   RENDER SYSTEM
============================== */
let currentPage = "dashboard";

async function render(page) {
    currentPage = page;

    if(page === "dashboard") {
        content.innerHTML = `
            <div class="card"><h2>📊 Firebase PMS Dashboard</h2></div>

            <div class="card">
                <input id="pname" placeholder="새 프로젝트"/>
                <button onclick="window.addProject()">추가</button>
            </div>

            <div class="card">
                총 프로젝트: ${projects.length}
            </div>
        `;
    }

    else if(page === "project") {
        content.innerHTML = `
            <div class="card"><h2>📁 프로젝트 리스트</h2></div>
            ${projects.map(p => `
                <div class="card">
                    <b>${p.name}</b><br/>
                    start: ${p.start}, duration: ${p.duration}
                </div>
            `).join("")}
        `;
    }

    else if(page === "gantt") {

        let html = projects.map(p => {
            const left = p.start * 10;
            const width = p.duration * 10;

            return `
                <div class="gantt-row">
                    <div class="gantt-label">${p.name}</div>
                    <div class="gantt-track">
                        <div class="gantt-bar"
                             style="left:${left}px;width:${width}px"
                             data-id="${p.id}">
                        </div>
                    </div>
                </div>
            `;
        }).join("");

        content.innerHTML = `
            <div class="card"><h2>📅 Level 2 Gantt (Drag Enabled)</h2></div>
            <div class="gantt">${html}</div>
        `;

        // drag attach
        document.querySelectorAll(".gantt-bar").forEach(bar => {
            const project = projects.find(p => p.id === bar.dataset.id);
            enableDrag(bar, project);
        });
    }
}

/* ==============================
   GLOBAL ACTIONS
============================== */
window.addProject = async function() {
    const name = document.getElementById("pname").value;
    if(!name) return;

    await createProject(name);
};

/* ==============================
   MENU
============================== */
menuItems.forEach(item => {
    item.addEventListener("click", async () => {
        menuItems.forEach(i => i.classList.remove("active"));
        item.classList.add("active");

        await refresh();
        render(item.dataset.page);
    });
});

/* ==============================
   INIT
============================== */
(async function init(){
    await refresh();

    menuItems[0].classList.add("active");
    render("dashboard");
})();

</script>

</body>
</html>
