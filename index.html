<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMO SaaS System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f4f6f9;
}

.sidebar {
    width:240px;
    background:#1e2a44;
    color:white;
    padding-top:20px;
}

.sidebar li {
    padding:14px 18px;
    cursor:pointer;
}

.sidebar li:hover { background:#2c3f66; }
.sidebar li.active { background:#00b894; }

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
}

th { background:#f1f2f6; }

button {
    padding:6px 10px;
    cursor:pointer;
    margin:2px;
}

/* GANTT */
.gantt {
    background:white;
    padding:15px;
    border-radius:10px;
}

.gantt-row {
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.gantt-label {
    width:160px;
}

.gantt-track {
    flex:1;
    height:18px;
    background:#eee;
    position:relative;
    border-radius:6px;
}

.gantt-bar {
    position:absolute;
    height:100%;
    background:#3498db;
    border-radius:6px;
    cursor:grab;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="site">현장</li>
        <li data-page="project">프로젝트</li>
        <li data-page="gantt">간트차트</li>
        <li data-page="intake">이슈</li>
        <li data-page="workflow">워크플로우</li>
        <li data-page="kpi">KPI</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= COLLECTION ================= */
const sitesCol = collection(db, "sites");
const projectsCol = collection(db, "projects");
const tasksCol = collection(db, "tasks");
const issuesCol = collection(db, "issues");

/* ================= STATE ================= */
let sites = [];
let projects = [];
let tasks = [];
let issues = [];

const content = document.getElementById("content");
const menuItems = document.querySelectorAll(".sidebar li");

/* ================= REALTIME ================= */
onSnapshot(sitesCol, s => {
    sites = s.docs.map(d => ({ id:d.id, ...d.data() }));
    render(currentPage);
});

onSnapshot(projectsCol, s => {
    projects = s.docs.map(d => ({ id:d.id, ...d.data() }));
    render(currentPage);
});

onSnapshot(tasksCol, s => {
    tasks = s.docs.map(d => ({ id:d.id, ...d.data() }));
    render(currentPage);
});

onSnapshot(issuesCol, s => {
    issues = s.docs.map(d => ({ id:d.id, ...d.data() }));
    render(currentPage);
});

/* ================= ACTION ================= */
window.addIssue = async () => {
    const title = prompt("이슈 제목");
    if(!title) return;

    await addDoc(issuesCol, {
        title,
        status:"New",
        log:[{ time:new Date().toLocaleString(), action:"Created" }]
    });
};

window.move = async (id, status) => {
    const issue = issues.find(i => i.id === id);
    const ref = doc(db, "issues", id);

    await updateDoc(ref, {
        status,
        log:[...issue.log, { time:new Date().toLocaleString(), action:status }]
    });
};

window.addTask = async () => {
    const name = prompt("Task 이름");
    if(!name) return;

    await addDoc(tasksCol, {
        name,
        start:0,
        duration:10
    });
};

/* ================= GANTT DRAG ================= */
function drag(bar, task) {
    let down = false;
    let startX = 0;

    bar.onmousedown = (e) => {
        down = true;
        startX = e.clientX;
    };

    window.onmousemove = async (e) => {
        if(!down) return;

        const dx = Math.round((e.clientX - startX) / 10);
        task.start += dx;
        startX = e.clientX;

        render("gantt");
    };

    window.onmouseup = async () => {
        if(!down) return;
        down = false;

        await updateDoc(doc(db,"tasks",task.id), {
            start: task.start,
            duration: task.duration
        });
    };
}

/* ================= RENDER ================= */
let currentPage = "site";

function render(page) {
    currentPage = page;

    /* -------- SITE -------- */
    if(page === "site") {
        content.innerHTML = `
            <div class="card"><h2>🏗 현장</h2></div>
            <div class="card">총 현장: ${sites.length}</div>
        `;
    }

    /* -------- PROJECT -------- */
    else if(page === "project") {
        content.innerHTML = `
            <div class="card">
                <h2>📁 프로젝트</h2>
                <button onclick="addTask()">+ Task 추가</button>
            </div>

            ${tasks.map(t => `
                <div class="card">
                    ${t.name}
                </div>
            `).join("")}
        `;
    }

    /* -------- GANTT -------- */
    else if(page === "gantt") {

        content.innerHTML = `
            <div class="card"><h2>📅 Gantt Chart (Realtime)</h2></div>

            <div class="gantt">
                ${tasks.map(t => `
                    <div class="gantt-row">
                        <div class="gantt-label">${t.name}</div>
                        <div class="gantt-track">
                            <div class="gantt-bar"
                                style="left:${t.start*10}px;width:${t.duration*10}px">
                            </div>
                        </div>
                    </div>
                `).join("")}
            </div>
        `;

        document.querySelectorAll(".gantt-bar").forEach((b,i) => {
            drag(b, tasks[i]);
        });
    }

    /* -------- ISSUE -------- */
    else if(page === "intake") {
        content.innerHTML = `
            <div class="card">
                <h2>📥 이슈</h2>
                <button onclick="addIssue()">+ 추가</button>
            </div>

            ${issues.map(i => `
                <div class="card">
                    <b>${i.title}</b><br/>
                    ${i.status}
                </div>
            `).join("")}
        `;
    }

    /* -------- WORKFLOW -------- */
    else if(page === "workflow") {
        content.innerHTML = `
            <div class="card"><h2>🔄 Workflow</h2></div>

            ${issues.map(i => `
                <div class="card">
                    ${i.title}<br/>
                    ${i.status}<br/><br/>

                    <button onclick="move('${i.id}','Assigned')">Assign</button>
                    <button onclick="move('${i.id}','Analyzing')">Analyze</button>
                    <button onclick="move('${i.id}','Resolved')">Resolve</button>
                    <button onclick="move('${i.id}','Closed')">Close</button>
                </div>
            `).join("")}
        `;
    }

    /* -------- KPI -------- */
    else if(page === "kpi") {
        content.innerHTML = `
            <div class="card"><h2>📊 KPI</h2></div>
            <div class="card">Issues: ${issues.length}</div>
            <div class="card">Tasks: ${tasks.length}</div>
            <div class="card">Sites: ${sites.length}</div>
        `;
    }
}

/* ================= MENU ================= */
menuItems.forEach(m => {
    m.onclick = () => {
        menuItems.forEach(i => i.classList.remove("active"));
        m.classList.add("active");
        render(m.dataset.page);
    };
});

/* INIT */
menuItems[0].classList.add("active");
render("site");

</script>

</body>
</html>
