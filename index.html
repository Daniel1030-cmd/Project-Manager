<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PMO System</title>
<meta name="description" content="현장, 프로젝트 접수, 이슈를 한 곳에서 관리하는 PMO System입니다."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════ */
:root{
  --ink:       #0f172a;
  --ink-2:     #1e293b;
  --ink-3:     #334155;
  --ink-4:     #64748b;
  --ink-5:     #94a3b8;
  --line:      #e2e8f0;
  --line-2:    #f1f5f9;
  --surface:   #ffffff;
  --bg:        #f8fafc;
  --bg-2:      #f1f5f9;

  --teal:      #0d9488;
  --teal-lt:   #ccfbf1;
  --teal-dk:   #0f766e;
  --blue:      #2563eb;
  --blue-lt:   #dbeafe;
  --amber:     #d97706;
  --amber-lt:  #fef3c7;
  --rose:      #e11d48;
  --rose-lt:   #ffe4e6;
  --violet:    #7c3aed;
  --violet-lt: #ede9fe;
  --green:     #16a34a;
  --green-lt:  #dcfce7;
  --slate:     #475569;
  --slate-lt:  #f1f5f9;

  /* AS 유/무상 컬러 */
  --paid:      #dc2626;
  --paid-lt:   #fee2e2;
  --free:      #0d9488;
  --free-lt:   #ccfbf1;
  --warn:      #d97706;
  --warn-lt:   #fffbeb;

  --sidebar-bg:    #0f172a;
  --sidebar-hover: #1e293b;
  --sidebar-active:#0d9488;

  --r-sm: 6px;
  --r:    10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --sh-xs: 0 1px 2px rgba(15,23,42,.06);
  --sh-sm: 0 1px 4px rgba(15,23,42,.08), 0 0 0 1px rgba(15,23,42,.04);
  --sh-md: 0 4px 12px rgba(15,23,42,.10), 0 0 0 1px rgba(15,23,42,.05);
  --sh-lg: 0 8px 28px rgba(15,23,42,.14), 0 0 0 1px rgba(15,23,42,.06);

  --sidebar-w: 220px;
}

*, *::before, *::after{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:'Inter','Noto Sans KR',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}

button{ font-family:inherit; cursor:pointer; border:none; outline:none; transition:all .15s ease; }
button:focus-visible{ box-shadow:0 0 0 3px rgba(13,148,136,.35); }
input, select{ font-family:inherit; }

/* ════ LAYOUT ════ */
.app{ display:flex; min-height:100vh; }

.sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--sidebar-bg);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:200;
  overflow:hidden;
}

.sidebar-brand{
  display:flex; align-items:center; gap:10px;
  padding:22px 18px 18px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.brand-icon{
  width:34px; height:34px;
  border-radius:9px;
  background:linear-gradient(135deg,var(--teal),#0891b2);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.brand-icon svg{ display:block; }
.brand-text{ flex:1; min-width:0; }
.brand-name{ font-size:14px; font-weight:700; color:#fff; letter-spacing:-.2px; line-height:1.2; }
.brand-url{ font-size:10.5px; color:var(--teal); letter-spacing:.4px; font-weight:500; margin-top:1px; }

.sidebar-nav{ flex:1; padding:10px; overflow-y:auto; }
.sidebar-nav ul{ list-style:none; }
.sidebar-section{
  font-size:10px; font-weight:700; letter-spacing:.8px;
  color:rgba(255,255,255,.28); text-transform:uppercase;
  padding:14px 8px 6px;
}
.nav-item{
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:var(--r);
  cursor:pointer; color:rgba(255,255,255,.62);
  font-size:13.5px; font-weight:500;
  transition:background .15s, color .15s;
  user-select:none;
}
.nav-item .nav-ic{ width:20px; text-align:center; font-size:15px; flex-shrink:0; }
.nav-item:hover{ background:var(--sidebar-hover); color:rgba(255,255,255,.9); }
.nav-item.active{ background:var(--teal); color:#fff; font-weight:600; }

.sidebar-footer{ padding:14px 18px; border-top:1px solid rgba(255,255,255,.07); font-size:11px; color:rgba(255,255,255,.25); }

.main{ flex:1; margin-left:var(--sidebar-w); display:flex; flex-direction:column; min-width:0; min-height:100vh; }

.topbar{
  height:58px; background:var(--surface); border-bottom:1px solid var(--line);
  display:flex; align-items:center; padding:0 24px; gap:12px;
  position:sticky; top:0; z-index:100;
}
.topbar-title{ font-size:15px; font-weight:700; color:var(--ink); flex:1; }
.topbar-breadcrumb{ font-size:12px; color:var(--ink-5); display:flex; align-items:center; gap:5px; }

.content{ flex:1; padding:24px 26px 40px; overflow-y:auto; }

.m-topbar{ display:none; }

/* ════ PAGE HEADER ════ */
.page-head{
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:16px; margin-bottom:24px; flex-wrap:wrap;
}
.page-title{ font-size:22px; font-weight:700; color:var(--ink); letter-spacing:-.4px; line-height:1.2; }
.page-subtitle{ font-size:13px; color:var(--ink-4); margin-top:3px; }
.page-actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

/* ════ KPI GRID ════ */
.kpi-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.kpi-card{
  background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r-lg); padding:18px 20px;
  box-shadow:var(--sh-xs); position:relative; overflow:hidden;
}
.kpi-card::before{
  content:''; position:absolute; top:0; left:0;
  width:3px; height:100%;
  background:var(--line); border-radius:3px 0 0 3px;
}
.kpi-card.c-teal::before{ background:var(--teal); }
.kpi-card.c-blue::before{ background:var(--blue); }
.kpi-card.c-amber::before{ background:var(--amber); }
.kpi-card.c-violet::before{ background:var(--violet); }
.kpi-card.c-rose::before{ background:var(--rose); }
.kpi-card.c-green::before{ background:var(--green); }
.kpi-eyebrow{ font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-5); margin-bottom:8px; }
.kpi-num{ font-size:30px; font-weight:700; color:var(--ink); line-height:1; letter-spacing:-1px; }
.kpi-card.c-teal  .kpi-num{ color:var(--teal-dk); }
.kpi-card.c-blue  .kpi-num{ color:var(--blue); }
.kpi-card.c-amber .kpi-num{ color:var(--amber); }
.kpi-card.c-violet.kpi-num{ color:var(--violet); }
.kpi-card.c-rose  .kpi-num{ color:var(--rose); }
.kpi-card.c-green .kpi-num{ color:var(--green); }
.kpi-sub{ font-size:12px; color:var(--ink-5); margin-top:4px; }

/* ════ CARD ════ */
.card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--sh-xs); margin-bottom:16px; }
.card-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--line);
  gap:12px; flex-wrap:wrap;
}
.card-title{ font-size:14px; font-weight:700; color:var(--ink); }
.card-body{ padding:20px; }
.card-body-flush{ padding:0; }

/* ════ BUTTONS ════ */
.btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:var(--r);
  font-size:13px; font-weight:600; line-height:1;
  border:none; cursor:pointer; white-space:nowrap;
  transition:all .15s ease;
}
.btn-primary{ background:var(--teal); color:#fff; box-shadow:0 1px 3px rgba(13,148,136,.35); }
.btn-primary:hover{ background:var(--teal-dk); box-shadow:0 2px 6px rgba(13,148,136,.45); }
.btn-secondary{ background:var(--surface); color:var(--ink-3); border:1px solid var(--line); box-shadow:var(--sh-xs); }
.btn-secondary:hover{ background:var(--bg-2); border-color:var(--ink-5); }
.btn-ghost{ background:transparent; color:var(--ink-4); padding:6px 10px; }
.btn-ghost:hover{ background:var(--bg-2); color:var(--ink); }
.btn-sm{ padding:5px 10px; font-size:12px; border-radius:var(--r-sm); }
.btn-icon{
  padding:7px; border-radius:var(--r-sm);
  display:inline-flex; align-items:center; justify-content:center;
  background:transparent; color:var(--ink-4); border:1px solid var(--line);
}
.btn-icon:hover{ background:var(--bg-2); color:var(--ink); }
.btn-icon.edit:hover{ background:var(--blue-lt); color:var(--blue); border-color:rgba(37,99,235,.2); }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn:active:not(:disabled){ transform:scale(.97); }

/* ════ SEARCH ════ */
.search-bar{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.search-wrap{ position:relative; flex:1; max-width:360px; }
.search-ic{ position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--ink-5); pointer-events:none; }
.search-wrap input{
  width:100%; padding:9px 34px 9px 34px;
  border:1px solid var(--line); border-radius:var(--r);
  font-size:13.5px; background:var(--surface); color:var(--ink);
  box-shadow:var(--sh-xs); transition:border-color .15s, box-shadow .15s;
}
.search-wrap input::placeholder{ color:var(--ink-5); }
.search-wrap input:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(13,148,136,.12); }
.search-clear{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--ink-5); font-size:12px;
  padding:3px 6px; cursor:pointer; display:none; border-radius:4px;
}
.search-clear:hover{ background:var(--bg-2); color:var(--ink); }
.search-wrap.has-val .search-clear{ display:inline-flex; }
.search-meta{ font-size:12px; color:var(--ink-5); margin-bottom:12px; min-height:16px; }

/* ════ TABLE ════ */
.tbl-wrap{ overflow-x:auto; }
.tbl{ width:100%; border-collapse:collapse; font-size:13px; }
.tbl th{
  background:var(--bg); border-bottom:2px solid var(--line);
  padding:10px 14px; text-align:left;
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.5px; color:var(--ink-4); white-space:nowrap;
}
.tbl td{
  padding:12px 14px; border-bottom:1px solid var(--line);
  color:var(--ink-2); white-space:nowrap; vertical-align:middle;
}
.tbl tbody tr:last-child td{ border-bottom:none; }
.tbl tbody tr:hover td{ background:var(--bg); }
.tbl .td-actions{ display:flex; gap:5px; align-items:center; }

/* ════ BADGES ════ */
.badge{
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:30px;
  font-size:11.5px; font-weight:600; white-space:nowrap; letter-spacing:.1px;
}
.badge-dot{ width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.7; }

/* status */
.b-ready   { background:#f1f5f9; color:#475569; }
.b-progress{ background:var(--teal-lt); color:var(--teal-dk); }
.b-expired { background:var(--rose-lt); color:var(--rose); }
.b-received{ background:var(--amber-lt); color:var(--amber); }
.b-done    { background:var(--teal-lt); color:var(--teal-dk); }
.b-new     { background:var(--blue-lt); color:var(--blue); }

/* contract type */
.b-rental  { background:var(--violet-lt); color:var(--violet); }
.b-sale    { background:#ecfdf5; color:#059669; }
.b-maint   { background:var(--blue-lt); color:var(--blue); }
.b-renew   { background:var(--amber-lt); color:var(--amber); }

/* ════ AS 유/무상 배지 ════ */
.b-paid{
  background:var(--paid-lt);
  color:var(--paid);
  font-weight:700;
  border:1px solid rgba(220,38,38,.15);
}
.b-free{
  background:var(--free-lt);
  color:var(--free);
  font-weight:700;
  border:1px solid rgba(13,148,136,.15);
}
/* 만료 임박 경고 (30일 이내) */
.b-warn-soon{
  background:var(--warn-lt);
  color:var(--warn);
  font-weight:700;
  border:1px solid rgba(217,119,6,.2);
}

/* ════ 유지보수 만료일 표시 ════ */
.maint-exp{
  font-size:11px;
  color:var(--ink-5);
  margin-top:2px;
  display:block;
}
.maint-exp.soon{ color:var(--warn); font-weight:600; }
.maint-exp.expired{ color:var(--rose); font-weight:600; }

/* ════ MOBILE CARDS ════ */
.mc-list{ display:none; }
.mc{
  background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r-lg); margin-bottom:10px;
  box-shadow:var(--sh-xs); overflow:hidden; transition:box-shadow .2s;
}
.mc:focus-within{ box-shadow:var(--sh-sm); }
.mc-head{
  display:flex; align-items:center; gap:10px;
  padding:14px 16px; cursor:pointer; user-select:none;
  background:var(--surface); -webkit-tap-highlight-color:transparent;
}
.mc-head:active{ background:var(--bg); }
.mc-title{ flex:1; min-width:0; }
.mc-name{ font-size:14.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-sub{ font-size:11.5px; color:var(--ink-4); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-badges{ display:flex; gap:5px; flex-shrink:0; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.mc-chevron{ color:var(--ink-5); flex-shrink:0; transition:transform .22s ease; font-size:11px; }
.mc-chevron.open{ transform:rotate(180deg); }
.mc-body{ max-height:0; overflow:hidden; transition:max-height .3s cubic-bezier(.4,0,.2,1); }
.mc-body.open{ max-height:800px; }
.mc-divider{ border:none; border-top:1px solid var(--line); }
.mc-fields{ padding:12px 16px 6px; }
.mc-field{
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:7px 0; border-bottom:1px dashed var(--line); gap:10px; font-size:13.5px;
}
.mc-field:last-child{ border-bottom:none; }
.mc-label{ color:var(--ink-5); font-size:12px; font-weight:600; white-space:nowrap; min-width:72px; flex-shrink:0; padding-top:1px; }
.mc-val{ color:var(--ink-2); text-align:right; word-break:break-word; font-size:13.5px; }
.mc-actions{
  display:flex; gap:8px; padding:10px 16px 14px;
  background:var(--bg); border-top:1px solid var(--line); flex-wrap:wrap;
}
.mc-actions .btn{ flex:1; justify-content:center; }

/* ════ EMPTY STATE ════ */
.empty{ text-align:center; padding:52px 24px; color:var(--ink-4); }
.empty-icon{ font-size:38px; margin-bottom:12px; opacity:.5; }
.empty-title{ font-size:15px; font-weight:600; color:var(--ink-3); margin-bottom:6px; }
.empty-body{ font-size:13px; line-height:1.6; }

/* ════ MODAL ════ */
.modal-overlay{
  position:fixed; inset:0;
  background:rgba(15,23,42,.55);
  display:flex; align-items:center; justify-content:center;
  padding:20px; z-index:500;
  backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
}
.modal-overlay.hidden{ display:none; }
.modal{
  background:var(--surface); border-radius:var(--r-xl);
  width:100%; max-width:480px; max-height:90vh;
  overflow-y:auto; box-shadow:var(--sh-lg);
  animation:modalIn .2s ease;
}
@keyframes modalIn{
  from{ opacity:0; transform:scale(.96) translateY(6px); }
  to  { opacity:1; transform:scale(1) translateY(0); }
}
.modal-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 22px 16px; border-bottom:1px solid var(--line);
}
.modal-title{ font-size:16px; font-weight:700; color:var(--ink); }
.modal-close{
  background:none; border:none; font-size:18px;
  color:var(--ink-4); padding:4px 8px;
  border-radius:var(--r-sm); cursor:pointer; line-height:1;
}
.modal-close:hover{ background:var(--bg-2); color:var(--ink); }
.modal-body{ padding:20px 22px; }

.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12px; font-weight:600; color:var(--ink-3); margin-bottom:6px; letter-spacing:.1px; }
.field input, .field select{
  width:100%; padding:10px 12px;
  border:1px solid var(--line); border-radius:var(--r);
  font-size:14px; color:var(--ink); background:var(--surface);
  transition:border-color .15s, box-shadow .15s;
  -webkit-appearance:none; appearance:none;
}
.field input:focus, .field select:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(13,148,136,.12); }
.field .ferr{ font-size:12px; color:var(--rose); margin-top:5px; display:none; }
.field.invalid input, .field.invalid select{ border-color:var(--rose); }
.field.invalid .ferr{ display:block; }
.field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* AS 자동산출 안내 박스 */
.as-hint{
  background:linear-gradient(135deg, #f0fdf4, #ecfdf5);
  border:1px solid rgba(13,148,136,.2);
  border-radius:var(--r);
  padding:12px 14px;
  font-size:12.5px;
  color:var(--teal-dk);
  margin-bottom:14px;
  display:flex;
  align-items:flex-start;
  gap:8px;
}
.as-hint-icon{ font-size:15px; flex-shrink:0; margin-top:1px; }

.modal-footer{
  display:flex; gap:8px; justify-content:flex-end;
  padding:16px 22px 20px; border-top:1px solid var(--line);
}

/* ════ TOAST ════ */
.toast{
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--ink); color:#fff;
  padding:10px 18px; border-radius:30px;
  font-size:13.5px; font-weight:500;
  box-shadow:0 6px 20px rgba(15,23,42,.22);
  opacity:0; transition:opacity .22s, transform .22s;
  z-index:9999; pointer-events:none;
  max-width:90vw; text-align:center;
  display:flex; align-items:center; gap:7px; white-space:nowrap;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.toast.t-success{ background:var(--teal-dk); }
.toast.t-error  { background:var(--rose); }
.toast .t-dot{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.6); flex-shrink:0; }

/* ════ DASHBOARD ════ */
.dash-welcome{
  background:linear-gradient(120deg, var(--ink-2) 0%, #1e3a5f 100%);
  border-radius:var(--r-xl); padding:28px 32px; color:#fff;
  margin-bottom:24px; position:relative; overflow:hidden;
}
.dash-welcome::after{ content:''; position:absolute; right:-20px; top:-20px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,.04); }
.dash-welcome::before{ content:''; position:absolute; right:60px; bottom:-40px; width:200px; height:200px; border-radius:50%; background:rgba(13,148,136,.12); }
.dash-welcome h2{ font-size:20px; font-weight:700; margin-bottom:4px; position:relative; }
.dash-welcome p{ font-size:13px; color:rgba(255,255,255,.62); position:relative; }

.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
.stat-row-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:16px 18px; box-shadow:var(--sh-xs); }
.stat-row-card .label{ font-size:12px; color:var(--ink-5); font-weight:600; letter-spacing:.3px; margin-bottom:6px; }
.stat-row-card .val{ font-size:22px; font-weight:700; color:var(--ink); }

.site-bar{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.site-bar-label{ width:120px; font-size:12.5px; color:var(--ink-3); text-align:right; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.site-bar-track{ flex:1; height:10px; background:var(--bg-2); border-radius:6px; overflow:hidden; }
.site-bar-fill{ height:100%; background:linear-gradient(90deg,var(--teal),#0891b2); border-radius:6px; transition:width .4s ease; }
.site-bar-count{ width:30px; font-size:12px; color:var(--ink-4); flex-shrink:0; }

.no-sites{
  background:#fffbeb; border:1px solid #fde68a;
  border-radius:var(--r-lg); padding:14px 16px;

/* ── XSS ── */
const esc = v =>
  v==null ? "" :
  String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;")

/* ── Toast ── */
let _tt;
function toast(msg, type=""){

/* ── Date ── */
function toDate(v){
  if(!v) return null;
  if(typeof v.toDate==="function") return v.toDate();
  const d=new Date(v); return isNaN(d)?null:d;
}
function fmtDate(v){
  const d=toDate(v); if(!d) return "-";
  return d.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"});
}

/* ═══════════════════════════════════════════════
   유/무상 AS 자동 산출 함수
   - contractStart: "YYYY-MM-DD" 문자열
   - maintenancePeriod: "12개월", "24개월", "5년", "2년6개월" 등 자유 형식
   반환: { type: "무상"|"유상"|"알수없음", expireDate: Date|null, daysLeft: number|null }
═══════════════════════════════════════════════ */
function calcAS(contractStart, maintenancePeriod){
  if(!contractStart || !maintenancePeriod){
    return { type:"알수없음", expireDate:null, daysLeft:null };
  }

  const start = new Date(contractStart);
  if(isNaN(start)) return { type:"알수없음", expireDate:null, daysLeft:null };

  /* 유지보수 기간을 월(month) 단위로 파싱 */
  let totalMonths = 0;
  const mp = String(maintenancePeriod).trim();

  /* 패턴: "5년", "2년 6개월", "18개월", "1년6개월", "24개월" 등 */
  const yearMatch  = mp.match(/(\d+\.?\d*)\s*년/);
  const monthMatch = mp.match(/(\d+\.?\d*)\s*개?월/);

  if(yearMatch)  totalMonths += parseFloat(yearMatch[1])  * 12;
  if(monthMatch) totalMonths += parseFloat(monthMatch[1]);

  /* 숫자만 입력된 경우 개월로 간주 ("12" → 12개월) */
  if(!yearMatch && !monthMatch){
    const numOnly = parseFloat(mp);
    if(!isNaN(numOnly)) totalMonths = numOnly;
  }

  if(totalMonths <= 0) return { type:"알수없음", expireDate:null, daysLeft:null };

  /* 만료일 계산 */
  const expire = new Date(start);
  expire.setMonth(expire.getMonth() + Math.floor(totalMonths));
  const remainDays = Math.ceil((expire - new Date()) / 86400000);

  let type;
  if(remainDays > 0){
    type = "무상"; // 유지보수 기간 내 → 무상 AS
  } else {
    type = "유상"; // 유지보수 기간 만료 → 유상 AS
  }

  return { type, expireDate: expire, daysLeft: remainDays };
}

/* AS 배지 HTML */
function bAS(contractStart, maintenancePeriod){
  const { type, expireDate, daysLeft } = calcAS(contractStart, maintenancePeriod);

  if(type === "알수없음"){
    return `<span class="badge b-ready">-</span>`;
  }

  if(type === "무상"){
    /* 30일 이내 만료 임박 경고 */
    if(daysLeft <= 30){
      return `<span class="badge b-warn-soon">⚠️ 무상 (${daysLeft}일 후 만료)</span>`;
    }
    return `<span class="badge b-free">✅ 무상</span>`;
  }

  /* 유상 */
  return `<span class="badge b-paid">💰 유상</span>`;
}

/* AS 만료일 서브텍스트 */
function asExpireText(contractStart, maintenancePeriod){
  const { type, expireDate, daysLeft } = calcAS(contractStart, maintenancePeriod);
  if(!expireDate) return "";

  const fmt = expireDate.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"});

  if(type === "유상"){
    return `<span class="maint-exp expired">만료: ${fmt}</span>`;
  }
  if(daysLeft <= 30){
    return `<span class="maint-exp soon">만료: ${fmt} (${daysLeft}일 남음)</span>`;
  }
  return `<span class="maint-exp">만료: ${fmt}</span>`;
}

/* ══════════════════════════════

══════════════════════════════ */
const $overlay = document.getElementById("modalOverlay");
const $modal   = document.getElementById("modalEl");

function openModal({title, fields, values={}, onSave, hint=""}){
  $modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${esc(title)}</div>
      <button class="modal-close" id="mc-x">✕</button>
    </div>
    <div class="modal-body">
      ${hint ? `<div class="as-hint"><span class="as-hint-icon">💡</span><span>${hint}</span></div>` : ""}
      <form id="mForm">
        ${buildFields(fields, values)}
        <div style="display:none"><button type="submit"></button></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="mc-cancel">취소</button>
      <button class="btn btn-primary"   id="mc-save">저장</button>
    </div>
  `;
  $overlay.classList.remove("hidden");
  document.getElementById("f_"+fields.find(f=>!f.hidden)?.key)?.focus();

  const close = ()=> $overlay.classList.add("hidden");
  document.getElementById("mc-x").onclick = close;
  document.getElementById("mc-cancel").onclick = close;
  $overlay.onclick = e=>{ if(e.target===$overlay) close(); };

  const doSave = async ()=>{
    const data={}, flds=fields.filter(f=>!f.hidden);
    let ok=true;
    flds.forEach(f=>{
      const el=document.getElementById("f_"+f.key);
      if(!el) return;
      const v=el.value.trim();
      const wrap=el.closest(".field");
      if(f.req&&!v){ wrap?.classList.add("invalid"); ok=false; }
      else wrap?.classList.remove("invalid");
      data[f.key]=v;
    });
    if(!ok) return;
    const btn=document.getElementById("mc-save");
    btn.disabled=true; btn.textContent="저장 중…";
    try{
      await onSave(data);
      close();
    } catch(err){
      console.error(err);
      toast("저장 실패 — 다시 시도해주세요","error");
      btn.disabled=false; btn.textContent="저장";
    }
  };

  document.getElementById("mc-save").onclick = doSave;
  document.getElementById("mForm").onsubmit = e=>{ e.preventDefault(); doSave(); };
}

function buildFields(fields, vals){
  const rows=[];
  let i=0;
  while(i<fields.length){
    if(fields[i].hidden){ i++; continue; }
    if(fields[i].pair && fields[i+1] && !fields[i+1].hidden){
      rows.push(`<div class="field-row">${fld(fields[i],vals)}${fld(fields[i+1],vals)}</div>`);
      i+=2;
    } else {
      rows.push(fld(fields[i],vals));
      i++;
    }
  }
  return rows.join("");
}

function fld(f, vals){
  const val = esc(vals[f.key]||"");
  const inner = f.type==="select"
    ? `<select id="f_${f.key}" name="${f.key}">
         <option value="">선택</option>
         ${f.opts.map(o=>`<option value="${esc(o)}" ${vals[f.key]===o?"selected":""}>${esc(o)}</option>`).join("")}
       </select>`
    : `<input id="f_${f.key}" name="${f.key}" type="${f.type||"text"}" value="${val}" autocomplete="off" placeholder="${esc(f.ph||"")}"/>`;
  return `
    <div class="field">
      <label for="f_${f.key}">${esc(f.label)}${f.req?" <span style='color:var(--rose)'>*</span>":""}</label>
      ${inner}
      <div class="ferr">${esc(f.err||"필수 입력")}</div>
    </div>`;
}

const _renderers={};
window._si=(key,v)=>{
  sq[key]=v;
  const w=document.getElementById("sw_"+key);

  _renderers[key]?.();
};
window._sc=(key)=>{

function match(q,fs){ if(!q) return true; const lq=q.toLowerCase(); return fs.some(f=>String(f||"").toLowerCase().includes(lq)); }
function noResults(q){ return `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">결과 없음</div><div class="empty-body">"${esc(q)}"에 해당하는 항목이 없습니다.</div></div>`; }

/* ── badges ── */
function bSite(s){ const m={"준비":"b-ready","진행":"b-progress","만료":"b-expired"}; return `<span class="badge ${m[s]||"b-ready"}"><span class="badge-dot"></span>${esc(s||"준비")}</span>`; }

function renderSite(){
  const total=site.length;
  const progress=site.filter(s=>s.status==="진행").length;
  const expired=site.filter(s=>s.status==="만료").length;

  /* AS 집계 */
  const asStats = site.reduce((acc, s)=>{
    const { type, daysLeft } = calcAS(s.contractStart, s.maintenancePeriod);
    if(type==="무상") acc.free++;
    else if(type==="유상") acc.paid++;
    else acc.unknown++;
    if(type==="무상" && daysLeft !== null && daysLeft <= 30) acc.soon++;
    return acc;
  }, {free:0, paid:0, unknown:0, soon:0});

  $content.innerHTML=`
    <div class="page-head">
      <div class="page-head-left">
        <div class="page-title">Site Master</div>
        <div class="page-subtitle">등록된 현장을 관리합니다</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="_openAddSite()">+ 현장 등록</button>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);">
      ${kpiHtml(total,"전체 현장","c-teal")}
      ${kpiHtml(progress,"진행 중","c-blue")}
      ${kpiHtml(expired,"만료","c-amber")}
      ${kpiHtml(asStats.free,"무상 AS","c-green", asStats.soon>0?`⚠️ ${asStats.soon}건 임박`:"")}
      ${kpiHtml(asStats.paid,"유상 AS","c-rose")}
    </div>

    ${asStats.soon > 0 ? `
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;">
      <span style="font-size:18px;">⏰</span>
      <span>무상 AS 만료 임박 현장이 <strong>${asStats.soon}건</strong> 있습니다. 계약 갱신 여부를 확인해주세요.</span>
    </div>` : ""}

    ${!site.length?`<div class="card"><div class="card-body">${empty("🏗️","등록된 현장이 없습니다","+ 현장 등록 버튼으로 첫 현장을 추가해보세요")}</div></div>`:`
    <div class="card">
      <div class="card-header">
        <div class="card-title">현장 목록</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-5);">
          <span style="display:inline-flex;align-items:center;gap:4px;"><span class="badge b-free" style="font-size:11px;">✅ 무상</span> 유지보수 기간 내</span>
          <span style="display:inline-flex;align-items:center;gap:4px;"><span class="badge b-paid" style="font-size:11px;">💰 유상</span> 기간 만료</span>
        </div>
      </div>
      <div class="card-body">
        ${searchBox("site","현장명, 고객사, 장비, PM으로 검색")}
        <div id="siteRA"></div>
      </div>
    </div>`}`;
  renderSiteResults();
}

const PROJ_FIELDS = [
  {key:"siteName",  label:"현장명",   type:"select", opts:[], req:true, err:"현장을 선택해주세요"},
  {key:"receiptDate",label:"접수일자", type:"date", req:true},
  {key:"symptom",   label:"접수 증상", req:true, ph:"증상을 간략히 입력"},
  {key:"manager",   label:"담당자",   ph:"이름", pair:true},
  {key:"phone",     label:"연락처",   type:"tel", pair:true},
  {key:"pm",        label:"담당 PM"},
];

function projFields(){ return PROJ_FIELDS.map(f=>f.key==="siteName"?{...f,opts:site.map(s=>s.name).filter(Boolean)}:f); }

window._openAddProject = ()=>{
  if(!site.length){ toast("먼저 Site 메뉴에서 현장을 등록해주세요","error"); return; }
  openModal({
    title:"신규 접수 등록",
    fields:projFields(),
    onSave: async d=>{
      await addDoc(collection(db,COL.tasks),{...d, status:"접수", createdAt:serverTimestamp(), completedAt:null, processTime:0});
      toast("접수가 등록되었습니다","success");
    }
  });
};

window._openEditProject = id=>{
  const t=tasks.find(x=>x.id===id); if(!t) return;
  openModal({
    title:"접수 수정",
    fields:projFields(),
    values:t,
    onSave: async d=>{
      await updateDoc(doc(db,COL.tasks,id), d);
      toast("접수 정보가 수정되었습니다","success");
    }
  });
};

window._completeProject = async id=>{
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const start=t.createdAt?toDate(t.createdAt):new Date();
  const hrs=Math.max(0,Math.round((new Date()-start)/3600000));

  /* 접수 시점의 현장 AS 구분도 함께 저장 */
  const linkedSite = site.find(s=>s.name===t.siteName);
  const asType = linkedSite ? calcAS(linkedSite.contractStart, linkedSite.maintenancePeriod).type : "알수없음";

  try{
    await updateDoc(doc(db,COL.tasks,id),{status:"완료", completedAt:serverTimestamp(), processTime:hrs, asType});
    toast(`완료 처리 · 처리시간 ${hrs}시간 · AS구분: ${asType}`,"success");
  } catch(e){ toast("처리 실패","error"); }
};

/* 정렬 */
window._projSortBy = col => {
  if(projSort.col === col){
    projSort.dir = projSort.dir === "asc" ? "desc" : "asc";
  } else {
    projSort.col = col;
    projSort.dir = col === "receiptDate" ? "desc" : "asc";
  }
  renderProjectResults();
};

function sortIcon(col){
  if(projSort.col !== col) return `<span style="opacity:.3;font-size:10px;margin-left:3px;">↕</span>`;
  return projSort.dir === "asc"
    ? `<span style="color:var(--teal);font-size:10px;margin-left:3px;">↑</span>`
    : `<span style="color:var(--teal);font-size:10px;margin-left:3px;">↓</span>`;
}

function renderProjectResults(){
  const q=sq.project;
  let list=tasks.filter(t=>match(q,[t.siteName,t.symptom,t.manager,t.phone,t.pm]));
  const ra=document.getElementById("projRA");
  const ma=document.getElementById("sm_project");
  if(!ra) return;
  if(ma) ma.textContent=q?`${list.length}건 검색됨`:"";
  if(!list.length){ ra.innerHTML=noResults(q); return; }

  list = list.slice().sort((a,b)=>{
    const doneA = a.status==="완료" ? 1 : 0;
    const doneB = b.status==="완료" ? 1 : 0;
    if(doneA !== doneB) return doneA - doneB;
    let va = a[projSort.col] || "";
    let vb = b[projSort.col] || "";
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return projSort.dir === "asc" ? cmp : -cmp;
  });

  const pendingCount = list.filter(t=>t.status!=="완료").length;
  const doneCount    = list.length - pendingCount;

  const thSort = (col, label) =>
    `<th style="cursor:pointer;user-select:none;white-space:nowrap;" onclick="_projSortBy('${col}')">${label}${sortIcon(col)}</th>`;

  /* 현장별 AS 구분 조회 헬퍼 */
  const getSiteAS = (siteName) => {
    const s = site.find(x=>x.name===siteName);
    if(!s) return "";
    return bAS(s.contractStart, s.maintenancePeriod);
  };

  const tBodyWithDivider = (() => {
    return list.map((t,idx) => {
      const isDone = t.status==="완료";
      const rowStyle = isDone ? "opacity:.6;" : "";
      const sep = (isDone && idx===pendingCount && doneCount>0)
        ? `<tr><td colspan="10" style="padding:4px 14px;background:var(--bg-2);font-size:11.5px;color:var(--ink-5);font-weight:600;letter-spacing:.4px;border-bottom:2px solid var(--line);">처리 완료 ${doneCount}건</td></tr>`
        : "";
      return sep + `
      <tr style="${rowStyle}">
        <td style="font-weight:600;color:var(--ink)">${esc(t.siteName)||"-"}</td>
        <td>${esc(t.receiptDate)||"-"}</td>
        <td style="max-width:200px;white-space:normal;line-height:1.4;">${esc(t.symptom)}</td>
        <td>${esc(t.manager)||"-"}</td>
        <td>${esc(t.phone)||"-"}</td>
        <td>${esc(t.pm)||"-"}</td>
        <td>${bTask(t.status)}</td>
        <td>${getSiteAS(t.siteName)}</td>
        <td>${t.processTime||0}h</td>
        <td>
          <div class="td-actions">
            <button class="btn-icon edit" onclick="_openEditProject('${t.id}')" title="수정">✏️</button>
            ${!isDone
              ?`<button class="btn btn-sm btn-primary" onclick="_completeProject('${t.id}')">완료</button>`
              :`<span style="font-size:12px;color:var(--ink-5);">완료됨</span>`}
          </div>
        </td>
      </tr>`;
    }).join("");
  })();

  const mCards=list.map((t,idx)=>{
    const isDone = t.status==="완료";
    const dividerHtml = (isDone && idx===pendingCount && doneCount>0)
      ? `<div style="text-align:center;font-size:11.5px;color:var(--ink-5);font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:6px 0 2px;">── 처리 완료 ${doneCount}건 ──</div>`
      : "";
    return `${dividerHtml}
    <div class="mc" style="${isDone?"opacity:.65;":""}">
      <div class="mc-head" onclick="_toggleMC('t${t.id}')">
        <div class="mc-title">
          <div class="mc-name">${esc(t.siteName)||"미등록 현장"}</div>
          <div class="mc-sub">${esc(t.receiptDate)||"-"} · ${esc(t.symptom)||"-"}</div>
        </div>
        <div class="mc-badges">${bTask(t.status)}${getSiteAS(t.siteName)}</div>
        <span class="mc-chevron" id="mcc_t${t.id}">▼</span>
      </div>
      <div class="mc-body" id="mcb_t${t.id}">
        <hr class="mc-divider"/>
        <div class="mc-fields">
          <div class="mc-field"><span class="mc-label">접수일</span><span class="mc-val">${esc(t.receiptDate)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">AS 구분</span><span class="mc-val">${getSiteAS(t.siteName)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">담당자</span><span class="mc-val">${esc(t.manager)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">연락처</span><span class="mc-val">${esc(t.phone)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">PM</span><span class="mc-val">${esc(t.pm)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">처리시간</span><span class="mc-val">${t.processTime||0}h</span></div>
        </div>
        <div class="mc-actions">
          <button class="btn btn-secondary btn-sm" onclick="_openEditProject('${t.id}')">✏️ 수정</button>
          ${!isDone
            ?`<button class="btn btn-primary btn-sm" onclick="_completeProject('${t.id}')">✅ 완료 처리</button>`
            :`<span style="font-size:12px;color:var(--ink-5);padding:4px 6px;">처리 완료됨</span>`}
        </div>
      </div>
    </div>`;
  }).join("");

  ra.innerHTML=`
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr>
          ${thSort("siteName","현장명")}
          ${thSort("receiptDate","접수일")}
          <th>증상</th><th>담당자</th><th>연락처</th><th>PM</th>
          <th>상태</th>
          <th style="background:linear-gradient(to bottom,#f0fdf4,var(--bg));color:var(--teal-dk);">AS 구분</th>
          <th>처리시간</th><th>관리</th>
        </tr></thead>
        <tbody>${tBodyWithDivider}</tbody>
      </table>
    </div>
    <div class="mc-list">${mCards}</div>`;
}

/* ══════════════════════════════
   STATISTICS
══════════════════════════════ */
function byPeriod(type){
  const now=new Date();
  return tasks.filter(t=>{
    const d=toDate(t.createdAt); if(!d) return false;
    if(type==="day") return d.toDateString()===now.toDateString();
    if(type==="week"){ const w=new Date(now); w.setDate(w.getDate()-7); return d>=w; }
    if(type==="month") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(type==="year")  return d.getFullYear()===now.getFullYear();
    return false;
  });
}

window._setStatPeriod = p => {
  statPeriod = p;
  renderStatPeriodSection();
  document.querySelectorAll(".stat-tab").forEach(el=>{
    el.classList.toggle("stat-tab-active", el.dataset.period===p);
  });
};

function renderStatPeriodSection(){
  const el = document.getElementById("statPeriodBody");
  if(!el) return;

  const now = new Date();
  let data, groups;

  if(statPeriod==="week"){
    const weekAgo=new Date(now); weekAgo.setDate(weekAgo.getDate()-6); weekAgo.setHours(0,0,0,0);
    data = tasks.filter(t=>{ const d=toDate(t.createdAt); return d&&d>=weekAgo; });
    const days=[];
    for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); days.push(d); }
    groups = days.map(d=>{
      const label=d.toLocaleDateString("ko-KR",{month:"2-digit",day:"2-digit",weekday:"short"});
      const items=data.filter(t=>{const dd=toDate(t.createdAt); return dd&&dd.toDateString()===d.toDateString();});
      return {label, total:items.length, done:items.filter(x=>x.status==="완료").length,
              time:items.reduce((a,b)=>a+(b.processTime||0),0)};
    });
  } else if(statPeriod==="month"){
    data = tasks.filter(t=>{
      const d=toDate(t.createdAt);
      return d&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    });
    const wkMap={};
    data.forEach(t=>{
      const d=toDate(t.createdAt); if(!d) return;
      const week=Math.ceil(d.getDate()/7);
      const key=`${week}주차`;
      if(!wkMap[key]) wkMap[key]={label:key,total:0,done:0,time:0};
      wkMap[key].total++;
      if(t.status==="완료"){wkMap[key].done++;wkMap[key].time+=(t.processTime||0);}
    });
    groups=[1,2,3,4,5].map(w=>{
      const key=`${w}주차`;
      return wkMap[key]||{label:key,total:0,done:0,time:0};
    }).filter((_,i)=>i<5);
  } else {
    data = tasks.filter(t=>{const d=toDate(t.createdAt); return d&&d.getFullYear()===now.getFullYear();});
    const mMap={};
    data.forEach(t=>{
      const d=toDate(t.createdAt); if(!d) return;
      const key=`${d.getMonth()+1}월`;
      if(!mMap[key]) mMap[key]={label:key,total:0,done:0,time:0};
      mMap[key].total++;
      if(t.status==="완료"){mMap[key].done++;mMap[key].time+=(t.processTime||0);}
    });
    groups=Array.from({length:12},(_,i)=>{
      const key=`${i+1}월`;
      return mMap[key]||{label:key,total:0,done:0,time:0};
    });
  }

  const totalAll  = data.length;
  const doneAll   = data.filter(x=>x.status==="완료").length;
  const rateAll   = totalAll ? ((doneAll/totalAll)*100).toFixed(1) : "0.0";
  const avgAll    = totalAll ? (data.reduce((a,b)=>a+(b.processTime||0),0)/totalAll).toFixed(1):"0.0";
  const maxTotal  = Math.max(...groups.map(r=>r.total), 1);

  const kpiStrip = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">
      <div class="kpi-card c-blue"  style="padding:14px 16px;"><div class="kpi-eyebrow">전체 접수</div><div class="kpi-num" style="font-size:24px;">${totalAll}</div></div>
      <div class="kpi-card c-teal"  style="padding:14px 16px;"><div class="kpi-eyebrow">처리 완료</div><div class="kpi-num" style="font-size:24px;">${doneAll}</div></div>
      <div class="kpi-card c-violet"style="padding:14px 16px;"><div class="kpi-eyebrow">완료율</div><div class="kpi-num" style="font-size:24px;">${rateAll}%</div></div>
      <div class="kpi-card c-amber" style="padding:14px 16px;"><div class="kpi-eyebrow">평균처리시간</div><div class="kpi-num" style="font-size:24px;">${avgAll}h</div></div>
    </div>`;

  const bars = groups.map(r=>{
    const pct = (r.total/maxTotal*100).toFixed(1);
    const donePct = r.total ? (r.done/r.total*100).toFixed(0) : 0;
    const avg = r.total ? (r.time/r.total).toFixed(1) : "0.0";
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;">
        <div style="width:72px;font-size:12px;color:var(--ink-3);text-align:right;flex-shrink:0;font-weight:500;">${esc(r.label)}</div>
        <div style="flex:1;height:22px;background:var(--bg-2);border-radius:6px;overflow:hidden;position:relative;">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--teal),#0891b2);border-radius:6px;transition:width .4s ease;"></div>
          ${r.total>0?`<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#fff;font-weight:600;white-space:nowrap;">${r.total}건</span>`:""}
        </div>
        <div style="width:38px;font-size:11.5px;color:var(--teal-dk);font-weight:700;flex-shrink:0;">${donePct}%</div>
        <div style="width:34px;font-size:11.5px;color:var(--ink-5);flex-shrink:0;">${avg}h</div>
      </div>`;
  }).join("");

  const barHeader = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--line);">
      <div style="width:72px;"></div>
      <div style="flex:1;font-size:11px;font-weight:700;color:var(--ink-5);text-transform:uppercase;letter-spacing:.4px;">접수 건수</div>
      <div style="width:38px;font-size:11px;font-weight:700;color:var(--ink-5);">완료율</div>
      <div style="width:34px;font-size:11px;font-weight:700;color:var(--ink-5);">평균</div>
    </div>`;

  el.innerHTML = kpiStrip + `<div>${barHeader}${bars||`<div class="empty" style="padding:24px;"><div class="empty-icon" style="font-size:24px;">📭</div><div class="empty-body">해당 기간 데이터가 없습니다</div></div>`}</div>`;
}

function renderStatistics(){
  const sMap={};
  tasks.forEach(t=>{
    const n=t.siteName||"미등록";
    if(!sMap[n]) sMap[n]={total:0,done:0,time:0};
    sMap[n].total++; if(t.status==="완료") sMap[n].done++;
    sMap[n].time+=(t.processTime||0);
  });
  const maxSiteTotal=Math.max(...Object.values(sMap).map(s=>s.total), 1);

  const sPerf=Object.keys(sMap).map(k=>{
    const s=sMap[k];
    const avg=s.total?(s.time/s.total).toFixed(1):"0.0";
    const rate=s.total?((s.done/s.total)*100).toFixed(0):0;

    /* 해당 현장의 AS 구분 */
    const linkedSite = site.find(x=>x.name===k);
    const asBadge = linkedSite ? bAS(linkedSite.contractStart, linkedSite.maintenancePeriod) : "";

    return `
      <div class="site-bar" style="align-items:center;">
        <div class="site-bar-label" title="${esc(k)}">${esc(k)}</div>
        <div class="site-bar-track"><div class="site-bar-fill" style="width:${(s.total/maxSiteTotal*100).toFixed(1)}%"></div></div>
        <div class="site-bar-count">${s.total}</div>
        <div style="width:36px;font-size:12px;color:var(--teal-dk);font-weight:600;">${rate}%</div>
        <div style="width:80px;display:flex;justify-content:flex-end;">${asBadge}</div>
      </div>`;
  }).join("");

  const tabs=[["week","이번 주"],["month","이번 달"],["year","올해"]].map(([p,l])=>
    `<button class="stat-tab${statPeriod===p?" stat-tab-active":""}" data-period="${p}" onclick="_setStatPeriod('${p}')">${l}</button>`
  ).join("");

  $content.innerHTML=`
    <div class="page-head">
      <div class="page-head-left">
        <div class="page-title">Statistics</div>
        <div class="page-subtitle">기간별·현장별 처리 현황을 분석합니다</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-header">
        <div class="card-title">기간별 분석</div>
        <div class="stat-tab-group">${tabs}</div>
      </div>
      <div class="card-body" id="statPeriodBody"></div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">현장별 전체 현황</div></div>
      <div class="card-body">
        ${Object.keys(sMap).length
          ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--line);">
               <div style="width:120px;"></div>
               <div style="flex:1;font-size:11px;font-weight:700;color:var(--ink-5);text-transform:uppercase;letter-spacing:.4px;">접수 건수</div>
               <div style="width:30px;font-size:11px;font-weight:700;color:var(--ink-5);">건</div>
               <div style="width:36px;font-size:11px;font-weight:700;color:var(--ink-5);">완료율</div>
               <div style="width:80px;font-size:11px;font-weight:700;color:var(--teal-dk);text-align:right;">AS 구분</div>
             </div>${sPerf}`
          : `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">집계 데이터 없음</div><div class="empty-body">접수 데이터가 쌓이면 자동으로 분석됩니다.</div></div>`}
      </div>
    </div>`;

  renderStatPeriodSection();
}

/* ══════════════════════════════
   DASHBOARD
══════════════════════════════ */
function renderDashboard(){
  const now=new Date();
  const openIssues=issues.filter(i=>i.status==="New").length;
  const pendingTasks=tasks.filter(t=>t.status==="접수").length;
  const issueRate=issues.length?((issues.filter(i=>i.status==="Closed").length/issues.length)*100).toFixed(1):"0.0";

  /* AS 집계 */
  const asStats = site.reduce((acc, s)=>{
    const { type, daysLeft } = calcAS(s.contractStart, s.maintenancePeriod);
    if(type==="무상") acc.free++;
    else if(type==="유상") acc.paid++;
    if(type==="무상" && daysLeft !== null && daysLeft <= 30) acc.soon++;
    return acc;
  }, {free:0, paid:0, soon:0});

  const recentTasks=tasks.slice().sort((a,b)=>{
    const ta=toDate(a.createdAt)||new Date(0), tb=toDate(b.createdAt)||new Date(0);
    return tb-ta;
  }).slice(0,5);

  const recentIssues=issues.slice().sort((a,b)=>{
    const ta=toDate(a.createdAt)||new Date(0), tb=toDate(b.createdAt)||new Date(0);
    return tb-ta;
  }).slice(0,4);

  $content.innerHTML=`
    <div class="dash-welcome">
      <h2>안녕하세요 👋 PMO System에 오신 것을 환영합니다</h2>
      <p>${now.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"})} 기준 현황입니다</p>
    </div>

    <div class="kpi-grid">
      ${kpiHtml(site.length,"전체 현장","c-teal")}
      ${kpiHtml(tasks.length,"전체 접수","c-blue")}
      ${kpiHtml(pendingTasks,"미처리 접수","c-amber")}
      ${kpiHtml(issueRate+"%","이슈 종결률","c-violet")}
    </div>

    ${asStats.soon > 0 ? `
    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;cursor:pointer;" onclick="navigate('site')">
      <span style="font-size:18px;">⏰</span>
      <span>무상 AS 만료 임박 현장이 <strong>${asStats.soon}건</strong> 있습니다. <u>Site Master에서 확인</u></span>
    </div>` : ""}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;" id="dashGrid">
      <div class="card" style="margin:0;">
        <div class="card-header">
          <div class="card-title">최근 접수</div>
          <button class="btn btn-ghost btn-sm" onclick="navigate('project')">전체 보기 →</button>
        </div>
        <div class="card-body card-body-flush">
          ${recentTasks.length?`
          <table class="tbl">
            <thead><tr><th>현장</th><th>증상</th><th>상태</th></tr></thead>
            <tbody>${recentTasks.map(t=>`
              <tr>
                <td style="font-weight:600;max-width:90px;overflow:hidden;text-overflow:ellipsis;">${esc(t.siteName)||"-"}</td>
                <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.symptom)||"-"}</td>
                <td>${bTask(t.status)}</td>
              </tr>`).join("")}
            </tbody>
          </table>`
          :`<div class="empty" style="padding:32px 16px;"><div class="empty-icon" style="font-size:28px">🛠️</div><div class="empty-body">접수 내역이 없습니다</div></div>`}
        </div>
      </div>

      <div class="card" style="margin:0;">
        <div class="card-header">
          <div class="card-title">AS 현황</div>
          <button class="btn btn-ghost btn-sm" onclick="navigate('site')">현장 보기 →</button>
        </div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div style="background:var(--free-lt);border:1px solid rgba(13,148,136,.15);border-radius:var(--r-lg);padding:14px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:var(--free);">${asStats.free}</div>
              <div style="font-size:12px;color:var(--free);font-weight:600;margin-top:3px;">✅ 무상 AS</div>
            </div>
            <div style="background:var(--paid-lt);border:1px solid rgba(220,38,38,.15);border-radius:var(--r-lg);padding:14px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:var(--paid);">${asStats.paid}</div>
              <div style="font-size:12px;color:var(--paid);font-weight:600;margin-top:3px;">💰 유상 AS</div>
            </div>
          </div>
          ${asStats.soon > 0 ? `
          <div style="margin-top:10px;padding:10px 12px;background:var(--warn-lt);border:1px solid rgba(217,119,6,.2);border-radius:var(--r);font-size:12.5px;color:var(--warn);font-weight:600;">
            ⚠️ 30일 내 무상 만료 ${asStats.soon}건
          </div>` : `
          <div style="margin-top:10px;padding:10px 12px;background:var(--teal-lt);border:1px solid rgba(13,148,136,.15);border-radius:var(--r);font-size:12.5px;color:var(--teal-dk);">
            ✅ 임박 만료 현장 없음
          </div>`}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">최근 이슈</div>
        <button class="btn btn-ghost btn-sm" onclick="navigate('issue')">전체 보기 →</button>
      </div>
      <div class="card-body card-body-flush">
        ${recentIssues.length?`
        <table class="tbl">
          <thead><tr><th>이슈</th><th>유형</th><th>상태</th></tr></thead>
          <tbody>${recentIssues.map(i=>`
            <tr>
              <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;">${esc(i.title)||"-"}</td>
              <td>${bIssueType(i.issueType)}</td>
              <td>${bIssue(i.status)}</td>
            </tr>`).join("")}
          </tbody>
        </table>`
        :`<div class="empty" style="padding:32px 16px;"><div class="empty-icon" style="font-size:28px">⚠️</div><div class="empty-body">등록된 이슈가 없습니다</div></div>`}
      </div>
    </div>`;

  const g=document.getElementById("dashGrid");
  if(g && window.innerWidth<=768) g.style.gridTemplateColumns="1fr";
}

/* ── empty helper ── */
function empty(icon,title,body){
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${esc(title)}</div><div class="empty-body">${esc(body)}</div></div>`;
}

/* ══════════════════════════════
   ROUTER + NAV
══════════════════════════════ */
const PAGES={
  dashboard:{fn:renderDashboard, label:"Dashboard"},
  site:     {fn:renderSite,      label:"Site Master"},
  project:  {fn:renderProject,   label:"Project"},
  statistics:{fn:renderStatistics,label:"Statistics"},
  issue:    {fn:renderIssue,     label:"Issue"},
};

function render(page){
  curPage=page;
  const p=PAGES[page]||PAGES.dashboard;
  document.getElementById("topTitle").textContent=p.label;
  document.getElementById("topBreadcrumb").textContent=p.label;
  document.getElementById("mTopTitle").textContent=p.label;
  p.fn();
}

window.navigate=function(page){
  setActive(page);
  render(page);
  $content.scrollTop=0;
};

function setActive(page){
  document.querySelectorAll(".nav-item,.m-tab").forEach(el=>el.classList.toggle("active",el.dataset.page===page));
}

document.querySelectorAll(".nav-item,.m-tab").forEach(el=>{
  el.onclick=()=>navigate(el.dataset.page);
});

setActive("dashboard");
render("dashboard");
</script>
