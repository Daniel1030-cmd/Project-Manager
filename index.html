<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PMO System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0f172a;--ink-2:#1e293b;--ink-3:#334155;--ink-4:#64748b;--ink-5:#94a3b8;
  --line:#e2e8f0;--line-2:#f1f5f9;--surface:#ffffff;--bg:#f8fafc;--bg-2:#f1f5f9;
  --teal:#0d9488;--teal-lt:#ccfbf1;--teal-dk:#0f766e;
  --blue:#2563eb;--blue-lt:#dbeafe;
  --amber:#d97706;--amber-lt:#fef3c7;
  --rose:#e11d48;--rose-lt:#ffe4e6;
  --violet:#7c3aed;--violet-lt:#ede9fe;
  --green:#16a34a;--green-lt:#dcfce7;
  --slate:#475569;--slate-lt:#f1f5f9;
  --paid:#dc2626;--paid-lt:#fee2e2;
  --free:#0d9488;--free-lt:#ccfbf1;
  --warn:#d97706;--warn-lt:#fffbeb;
  --sidebar-bg:#0f172a;--sidebar-hover:#1e293b;--sidebar-active:#0d9488;
  --r-sm:6px;--r:10px;--r-lg:14px;--r-xl:20px;
  --sh-xs:0 1px 2px rgba(15,23,42,.06);
  --sh-sm:0 1px 4px rgba(15,23,42,.08),0 0 0 1px rgba(15,23,42,.04);
  --sh-md:0 4px 12px rgba(15,23,42,.10),0 0 0 1px rgba(15,23,42,.05);
  --sh-lg:0 8px 28px rgba(15,23,42,.14),0 0 0 1px rgba(15,23,42,.06);
  --sidebar-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .15s ease;}
button:focus-visible{box-shadow:0 0 0 3px rgba(13,148,136,.35);}
input,select,textarea{font-family:inherit;}
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow:hidden;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.07);}
.brand-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),#0891b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-text{flex:1;min-width:0;}
.brand-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;line-height:1.2;}
.brand-url{font-size:10.5px;color:var(--teal);letter-spacing:.4px;font-weight:500;margin-top:1px;}
.sidebar-nav{flex:1;padding:10px;overflow-y:auto;}
.sidebar-nav ul{list-style:none;}
.sidebar-section{font-size:10px;font-weight:700;letter-spacing:.8px;color:rgba(255,255,255,.28);text-transform:uppercase;padding:14px 8px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.62);font-size:13.5px;font-weight:500;transition:background .15s,color .15s;user-select:none;}
.nav-item .nav-ic{width:20px;text-align:center;font-size:15px;flex-shrink:0;}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.9);}
.nav-item.active{background:var(--teal);color:#fff;font-weight:600;}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.25);}
.main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-width:0;min-height:100vh;}
.topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;color:var(--ink);flex:1;}
.topbar-breadcrumb{font-size:12px;color:var(--ink-5);display:flex;align-items:center;gap:5px;}
.content{flex:1;padding:24px 26px 40px;overflow-y:auto;}
.m-topbar{display:none;}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.4px;line-height:1.2;}
.page-subtitle{font-size:13px;color:var(--ink-4);margin-top:3px;}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh-xs);position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--line);border-radius:3px 0 0 3px;}
.kpi-card.c-teal::before{background:var(--teal);}
.kpi-card.c-blue::before{background:var(--blue);}
.kpi-card.c-amber::before{background:var(--amber);}
.kpi-card.c-violet::before{background:var(--violet);}
.kpi-card.c-rose::before{background:var(--rose);}
.kpi-card.c-green::before{background:var(--green);}
.kpi-eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-5);margin-bottom:8px;white-space:normal;word-break:keep-all;line-height:1.3;}
.kpi-num{font-size:28px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-1px;}
.kpi-card.c-teal .kpi-num{color:var(--teal-dk);}
.kpi-card.c-blue .kpi-num{color:var(--blue);}
.kpi-card.c-amber .kpi-num{color:var(--amber);}
.kpi-card.c-rose .kpi-num{color:var(--rose);}
.kpi-card.c-green .kpi-num{color:var(--green);}
.kpi-sub{font-size:12px;color:var(--ink-5);margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-xs);margin-bottom:16px;}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap;}
.card-title{font-size:14px;font-weight:700;color:var(--ink);}
.card-body{padding:20px;}
.card-body-flush{padding:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;line-height:1;border:none;cursor:pointer;white-space:nowrap;transition:all .15s ease;}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 1px 3px rgba(13,148,136,.35);}
.btn-primary:hover{background:var(--teal-dk);}
.btn-secondary{background:var(--surface);color:var(--ink-3);border:1px solid var(--line);box-shadow:var(--sh-xs);}
.btn-secondary:hover{background:var(--bg-2);border-color:var(--ink-5);}
.btn-ghost{background:transparent;color:var(--ink-4);padding:6px 10px;}
.btn-ghost:hover{background:var(--bg-2);color:var(--ink);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--r-sm);}
.btn-icon{padding:7px;border-radius:var(--r-sm);display:inline-flex;align-items:center;justify-content:center;background:transparent;color:var(--ink-4);border:1px solid var(--line);}
.btn-icon:hover{background:var(--bg-2);color:var(--ink);}
.btn-icon.edit:hover{background:var(--blue-lt);color:var(--blue);border-color:rgba(37,99,235,.2);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn:active:not(:disabled){transform:scale(.97);}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.search-wrap{position:relative;flex:1;max-width:360px;}
.search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--ink-5);pointer-events:none;}
.search-wrap input{width:100%;padding:9px 34px 9px 34px;border:1px solid var(--line);border-radius:var(--r);font-size:13.5px;background:var(--surface);color:var(--ink);box-shadow:var(--sh-xs);transition:border-color .15s,box-shadow .15s;}
.search-wrap input::placeholder{color:var(--ink-5);}
.search-wrap input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink-5);font-size:12px;padding:3px 6px;cursor:pointer;display:none;border-radius:4px;}
.search-wrap.has-val .search-clear{display:inline-flex;}
.search-meta{font-size:12px;color:var(--ink-5);margin-bottom:12px;min-height:16px;}
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--bg);border-bottom:2px solid var(--line);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-4);white-space:nowrap;}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--ink-2);white-space:nowrap;vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:var(--bg);}
.tbl .td-actions{display:flex;gap:5px;align-items:center;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:30px;font-size:11.5px;font-weight:600;white-space:nowrap;letter-spacing:.1px;}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;}
.b-ready{background:#f1f5f9;color:#475569;}
.b-progress{background:var(--teal-lt);color:var(--teal-dk);}
.b-expired{background:var(--rose-lt);color:var(--rose);}
.b-received{background:var(--amber-lt);color:var(--amber);}
.b-done{background:var(--teal-lt);color:var(--teal-dk);}
.b-new{background:var(--blue-lt);color:var(--blue);}
.b-rental{background:var(--violet-lt);color:var(--violet);}
.b-sale{background:#ecfdf5;color:#059669;}
.b-maint{background:var(--blue-lt);color:var(--blue);}
.b-renew{background:var(--amber-lt);color:var(--amber);}
.b-paid{background:var(--paid-lt);color:var(--paid);font-weight:700;border:1px solid rgba(220,38,38,.15);}
.b-free{background:var(--free-lt);color:var(--free);font-weight:700;border:1px solid rgba(13,148,136,.15);}
.b-warn-soon{background:var(--warn-lt);color:var(--warn);font-weight:700;border:1px solid rgba(217,119,6,.2);}
.maint-exp{font-size:11px;color:var(--ink-5);margin-top:2px;display:block;}
.maint-exp.soon{color:var(--warn);font-weight:600;}
.maint-exp.expired{color:var(--rose);font-weight:600;}
.mc-list{display:none;}
.mc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:10px;box-shadow:var(--sh-xs);overflow:hidden;transition:box-shadow .2s;}
.mc-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;background:var(--surface);-webkit-tap-highlight-color:transparent;}
.mc-head:active{background:var(--bg);}
.mc-title{flex:1;min-width:0;}
.mc-name{font-size:14.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-sub{font-size:11.5px;color:var(--ink-4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-badges{display:flex;gap:5px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.mc-chevron{color:var(--ink-5);flex-shrink:0;transition:transform .22s ease;font-size:11px;}
.mc-chevron.open{transform:rotate(180deg);}
.mc-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.mc-body.open{max-height:1200px;}
.mc-divider{border:none;border-top:1px solid var(--line);}
.mc-fields{padding:12px 16px 6px;}
.mc-field{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px dashed var(--line);gap:10px;font-size:13.5px;}
.mc-field:last-child{border-bottom:none;}
.mc-label{color:var(--ink-5);font-size:12px;font-weight:600;white-space:nowrap;min-width:76px;flex-shrink:0;padding-top:1px;}
.mc-val{color:var(--ink-2);text-align:right;word-break:break-word;font-size:13.5px;}
.mc-actions{display:flex;gap:8px;padding:10px 16px 14px;background:var(--bg);border-top:1px solid var(--line);flex-wrap:wrap;}
.mc-actions .btn{flex:1;justify-content:center;}
.empty{text-align:center;padding:52px 24px;color:var(--ink-4);}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.5;}
.empty-title{font-size:15px;font-weight:600;color:var(--ink-3);margin-bottom:6px;}
.empty-body{font-size:13px;line-height:1.6;}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:500;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:var(--r-xl);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--line);}
.modal-title{font-size:16px;font-weight:700;color:var(--ink);}
.modal-close{background:none;border:none;font-size:18px;color:var(--ink-4);padding:4px 8px;border-radius:var(--r-sm);cursor:pointer;line-height:1;}
.modal-close:hover{background:var(--bg-2);color:var(--ink);}
.modal-body{padding:20px 22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:6px;letter-spacing:.1px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r);font-size:14px;color:var(--ink);background:var(--surface);transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none;}
.field textarea{resize:vertical;min-height:70px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.field .ferr{font-size:12px;color:var(--rose);margin-top:5px;display:none;}
.field.invalid input,.field.invalid select{border-color:var(--rose);}
.field.invalid .ferr{display:block;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.as-hint{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid rgba(13,148,136,.2);border-radius:var(--r);padding:12px 14px;font-size:12.5px;color:var(--teal-dk);margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
.as-hint-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 22px 20px;border-top:1px solid var(--line);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;font-weight:500;box-shadow:0 6px 20px rgba(15,23,42,.22);opacity:0;transition:opacity .22s,transform .22s;z-index:9999;pointer-events:none;max-width:90vw;text-align:center;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.t-success{background:var(--teal-dk);}
.toast.t-error{background:var(--rose);}
.toast .t-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.6);flex-shrink:0;}
.dash-welcome{background:linear-gradient(120deg,var(--ink-2) 0%,#1e3a5f 100%);border-radius:var(--r-xl);padding:28px 32px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden;}
.dash-welcome::after{content:'';position:absolute;right:-20px;top:-20px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);}
.dash-welcome::before{content:'';position:absolute;right:60px;bottom:-40px;width:200px;height:200px;border-radius:50%;background:rgba(13,148,136,.12);}
.dash-welcome h2{font-size:20px;font-weight:700;margin-bottom:4px;position:relative;}
.dash-welcome p{font-size:13px;color:rgba(255,255,255,.62);position:relative;}
.site-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.site-bar-label{width:120px;font-size:12.5px;color:var(--ink-3);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.site-bar-track{flex:1;height:10px;background:var(--bg-2);border-radius:6px;overflow:hidden;}
.site-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),#0891b2);border-radius:6px;transition:width .4s ease;}
.site-bar-count{width:30px;font-size:12px;color:var(--ink-4);flex-shrink:0;}
.no-sites{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r-lg);padding:14px 16px;font-size:13px;color:#92400e;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.stat-tab-group{display:flex;gap:4px;background:var(--bg-2);border-radius:var(--r);padding:3px;}
.stat-tab{padding:5px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-4);background:transparent;border:none;cursor:pointer;transition:all .15s ease;white-space:nowrap;}
.stat-tab:hover{color:var(--ink);background:rgba(255,255,255,.6);}
.stat-tab-active{background:var(--surface)!important;color:var(--teal-dk)!important;box-shadow:var(--sh-xs);}

/* ════ QUOTE MODAL WIDE ════ */
.modal-wide{max-width:780px;}

/* ════ DETAIL MODAL ════ */
.modal-xl{max-width:700px;}

/* ════ AS 이력카드 탭 ════ */
.as-tabs{display:flex;gap:2px;background:var(--bg-2);border-radius:var(--r);padding:3px;margin-bottom:18px;}
.as-tab{flex:1;padding:8px 6px;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink-4);background:transparent;border:none;cursor:pointer;transition:all .15s;text-align:center;white-space:nowrap;}
.as-tab:hover{background:rgba(255,255,255,.7);color:var(--ink);}
.as-tab.active{background:var(--surface);color:var(--teal-dk);box-shadow:var(--sh-xs);}
.as-tab-panel{display:none;}
.as-tab-panel.active{display:block;}

/* ════ AS 이력카드 섹션 ════ */
.as-section{margin-bottom:18px;}
.as-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-5);margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:7px;border-bottom:1px solid var(--line-2);}
.as-section-title span{width:18px;height:18px;border-radius:50%;background:var(--teal-lt);color:var(--teal-dk);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}

/* ════ 원인구분 셀렉트 컬러 ════ */
.cause-hw{color:#d97706;}
.cause-sw{color:#2563eb;}
.cause-user{color:#7c3aed;}
.cause-env{color:#0891b2;}
.cause-age{color:#94a3b8;}

/* ════ 방문일정 타임라인 ════ */
.visit-timeline{position:relative;padding-left:20px;}
.visit-timeline::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line);border-radius:1px;}
.visit-step{position:relative;margin-bottom:12px;}
.visit-step:last-child{margin-bottom:0;}
.visit-dot{position:absolute;left:-17px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--line);border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line);}
.visit-dot.done{background:var(--teal);}
.visit-dot.active{background:var(--blue);}
.visit-dot.pending{background:var(--amber);}
.visit-label{font-size:11px;font-weight:700;color:var(--ink-5);letter-spacing:.3px;}
.visit-val{font-size:13px;color:var(--ink-2);margin-top:2px;font-weight:500;}
.visit-val.highlight{color:var(--blue);font-weight:700;}

/* ════ D-day 배지 ════ */
.dday{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;margin-left:6px;}
.dday-today{background:#fef9c3;color:#854d0e;}
.dday-soon{background:var(--blue-lt);color:var(--blue);}
.dday-past{background:var(--rose-lt);color:var(--rose);}
.dday-future{background:var(--line-2);color:var(--ink-4);}

/* ════ 조치유형 태그 ════ */
.action-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;}
.at-visit{background:#eff6ff;color:#1d4ed8;}
.at-remote{background:#f0fdf4;color:#15803d;}
.at-parts{background:#fff7ed;color:#c2410c;}
.at-sw{background:#faf5ff;color:#7e22ce;}
.at-check{background:#f8fafc;color:#475569;}

/* ════ 완료처리 체크리스트 ════ */
.checklist{display:flex;flex-direction:column;gap:8px;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--bg);}
.check-item input[type="checkbox"]{width:16px;height:16px;margin-top:2px;accent-color:var(--teal);flex-shrink:0;}
.check-item-text{font-size:13px;color:var(--ink-2);line-height:1.4;}
.check-item.done-item .check-item-text{text-decoration:line-through;color:var(--ink-5);}

/* ════ 이력 타임라인 ════ */
.history-list{display:flex;flex-direction:column;gap:0;}
.history-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line);}
.history-item:last-child{border-bottom:none;}
.history-dot-col{display:flex;flex-direction:column;align-items:center;gap:0;width:20px;flex-shrink:0;padding-top:4px;}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--teal-lt);border:2px solid var(--teal);flex-shrink:0;}
.history-line{flex:1;width:1px;background:var(--line);margin-top:3px;}
.history-content{flex:1;min-width:0;}
.history-meta{font-size:11px;color:var(--ink-5);margin-bottom:3px;}
.history-text{font-size:13px;color:var(--ink-2);line-height:1.5;}
.history-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10.5px;font-weight:700;background:var(--teal-lt);color:var(--teal-dk);margin-left:5px;}

/* ════ 증상 요약 카드 ════ */
.symptom-card{background:linear-gradient(135deg,#f8fafc,#f1f5f9);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;}
.symptom-card-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-5);margin-bottom:5px;}
.symptom-card-text{font-size:13.5px;color:var(--ink-2);line-height:1.6;}

/* ════ QUOTE STYLES ════ */
.qform-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.qform-grid .field{margin:0;}
.qform-full{grid-column:1/-1;}
.q-summary{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.q-summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line);}
.q-summary-row:last-child{border-bottom:none;}
.q-summary-label{font-size:12.5px;color:var(--ink-4);font-weight:600;}
.q-summary-val{font-size:13px;font-weight:700;color:var(--ink);}
.q-summary-total{background:var(--teal-lt);}
.q-summary-total .q-summary-label{font-size:13.5px;color:var(--teal-dk);font-weight:800;}
.q-summary-total .q-summary-val{font-size:16px;font-weight:800;color:var(--teal-dk);}
.qi-editor{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.qi-header{display:grid;grid-template-columns:2fr 60px 100px 110px 50px;gap:0;background:var(--bg);border-bottom:1px solid var(--line);padding:7px 10px;font-size:11px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.4px;}
.qi-row{display:grid;grid-template-columns:2fr 60px 100px 110px 50px;gap:4px;padding:6px 8px;border-bottom:1px solid var(--line-2);align-items:center;}
.qi-row:last-child{border-bottom:none;}
.qi-row input{padding:5px 7px;border:1px solid var(--line);border-radius:5px;font-size:12.5px;width:100%;}
.qi-row input:focus{outline:none;border-color:var(--teal);}
.qi-row .qi-amt{font-size:12px;font-weight:600;color:var(--teal-dk);text-align:right;padding-right:4px;}
.qi-row .qi-del{background:var(--rose-lt);color:var(--rose);border:none;border-radius:4px;padding:4px 7px;cursor:pointer;font-size:12px;}
.qi-add-btn{width:100%;padding:8px;background:var(--bg);border:none;border-top:1px solid var(--line);color:var(--teal);font-weight:600;font-size:13px;cursor:pointer;transition:background .15s;}
.qi-add-btn:hover{background:var(--teal-lt);}

/* ════ QUOTE PRINT ════ */
@media print{
  body > *:not(#quotePrintArea){display:none!important;}
  #quotePrintArea{display:block!important;position:fixed;inset:0;z-index:99999;background:#fff;padding:0;margin:0;}
  #quotePrintArea .no-print{display:none!important;}
  @page{margin:15mm;size:A4;}
  .qdoc{padding:28px 32px!important;max-width:100%!important;border:none!important;}
  .qdoc-header{flex-direction:row!important;align-items:flex-start!important;}
  .qdoc-meta-grid{grid-template-columns:1fr 1fr!important;}
  .qdoc-amount-box{flex-direction:row!important;align-items:center!important;}
}
#quotePrintArea{display:none;}
.qdoc{font-family:'Noto Sans KR','Inter',sans-serif;font-size:12px;color:#111;background:#fff;padding:28px 32px;max-width:780px;margin:0 auto;border:1px solid #ddd;border-radius:8px;}
.qdoc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:18px;border-bottom:3px solid #1a73c8;}
.qdoc-logo{height:52px;object-fit:contain;}
.qdoc-title-block{text-align:right;}
.qdoc-title{font-size:22px;font-weight:800;color:#1a73c8;letter-spacing:-0.5px;}
.qdoc-no{font-size:11px;color:#666;margin-top:3px;}
.qdoc-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:20px;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.qdoc-meta-col{padding:0;}
.qdoc-meta-row{display:flex;border-bottom:1px solid #eee;}
.qdoc-meta-row:last-child{border-bottom:none;}
.qdoc-meta-label{background:#f5f7fa;font-weight:700;font-size:11px;padding:8px 12px;min-width:90px;color:#444;border-right:1px solid #eee;white-space:nowrap;}
.qdoc-meta-val{padding:8px 12px;font-size:12px;color:#111;word-break:break-all;}
.qdoc-section-title{font-size:12px;font-weight:800;background:#1a73c8;color:#fff;padding:7px 12px;margin:16px 0 0;letter-spacing:.3px;}
.qdoc-items-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.qdoc-items-table th{background:#e8f0fe;color:#1a3a6b;font-weight:700;padding:8px 10px;border:1px solid #c5d3e8;text-align:center;white-space:nowrap;}
.qdoc-items-table td{padding:7px 10px;border:1px solid #dde3ee;vertical-align:middle;}
.qdoc-items-table tbody tr:nth-child(even) td{background:#fafbff;}
.qdoc-items-table .num{text-align:right;}
.qdoc-items-table .ctr{text-align:center;}
.qdoc-total-block{margin-top:0;border:1px solid #dde3ee;border-top:none;}
.qdoc-total-row{display:flex;justify-content:flex-end;align-items:center;border-bottom:1px solid #eee;}
.qdoc-total-row:last-child{border-bottom:none;}
.qdoc-total-label{padding:8px 16px;font-size:12px;font-weight:600;color:#555;background:#f5f7fa;border-right:1px solid #eee;min-width:120px;text-align:right;}
.qdoc-total-val{padding:8px 16px;font-size:12px;font-weight:700;color:#111;min-width:130px;text-align:right;}
.qdoc-total-row.grand .qdoc-total-label{background:#1a73c8;color:#fff;font-size:13px;}
.qdoc-total-row.grand .qdoc-total-val{background:#e8f0fe;color:#1a3a6b;font-size:15px;font-weight:800;}
.qdoc-notes{margin-top:16px;padding:12px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;font-size:11.5px;color:#7a4f00;line-height:1.7;}
.qdoc-notes-title{font-weight:800;margin-bottom:4px;color:#92400e;}
.qdoc-footer{margin-top:24px;padding-top:16px;border-top:2px solid #1a73c8;display:flex;justify-content:space-between;align-items:flex-end;}
.qdoc-footer-company{font-size:12px;color:#333;line-height:1.8;}
.qdoc-footer-company strong{font-size:14px;color:#1a73c8;}
.qdoc-amount-box{border:2px solid #1a73c8;border-radius:8px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#e8f0fe,#f0f7ff);}

/* Quote Preview Overlay */
.quote-preview-overlay{display:none;position:fixed;inset:0;z-index:9998;background:#fff;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.quote-preview-overlay.active{display:block;}
.quote-preview-bar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--sh-sm);}
.quote-preview-bar-title{font-size:14px;font-weight:700;color:var(--ink);}
.quote-preview-actions{display:flex;gap:8px;flex-wrap:wrap;}
.quote-preview-content{padding:16px;}

/* ════ STAT CAUSE/PARTS/ERROR DETAIL ════ */
.stat-rank-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stat-rank-label{width:120px;font-size:12px;color:var(--ink-3);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-rank-track{flex:1;height:16px;background:var(--bg-2);border-radius:4px;overflow:hidden;}
.stat-rank-fill{height:100%;border-radius:4px;}
.stat-rank-count{width:34px;font-size:12px;font-weight:700;flex-shrink:0;}
.stat-mini-table{width:100%;border-collapse:collapse;font-size:12px;}
.stat-mini-table th{background:var(--bg);padding:6px 8px;text-align:left;font-size:10.5px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);}
.stat-mini-table td{padding:6px 8px;border-bottom:1px solid var(--line-2);color:var(--ink-2);}
.stat-mini-table tr:last-child td{border-bottom:none;}

/* ════ 브랜드 배지 (NEO / SPARKOZ) ════ */
.b-neo{background:var(--blue-lt);color:var(--blue);font-weight:700;border:1px solid rgba(37,99,235,.18);}
.b-sparkoz{background:var(--violet-lt);color:var(--violet);font-weight:700;border:1px solid rgba(124,58,237,.18);}

/* ════ 브랜드별 재고 카드 ════ */
.brand-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.brand-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-xs);}
.brand-card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);}
.brand-card-head.neo{background:linear-gradient(135deg,#eff6ff,#dbeafe);}
.brand-card-head.sparkoz{background:linear-gradient(135deg,#faf5ff,#ede9fe);}
.brand-card-name{font-size:15px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px;letter-spacing:-.2px;}
.brand-card-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.brand-card-total{font-size:24px;font-weight:800;line-height:1;}
.brand-card-total span{font-size:11px;color:var(--ink-5);font-weight:600;margin-left:3px;}
.brand-card-body{padding:16px 18px 18px;}
.brand-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.brand-stat-row:last-child{margin-bottom:0;}
.brand-stat-label{width:56px;font-size:12.5px;color:var(--ink-3);font-weight:600;flex-shrink:0;}
.brand-stat-track{flex:1;height:18px;background:var(--bg-2);border-radius:5px;overflow:hidden;}
.brand-stat-fill{height:100%;border-radius:5px;transition:width .4s ease;}
.brand-stat-count{width:30px;text-align:right;font-size:12.5px;font-weight:700;flex-shrink:0;}

/* ════ MOBILE ════ */
@media(max-width:768px){
  :root{--sidebar-w:0px;}
  .sidebar{display:none;}
  .main{margin-left:0;}
  .topbar{display:none;}
  .m-topbar{display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 16px;background:var(--sidebar-bg);color:#fff;position:sticky;top:0;z-index:200;gap:12px;}
  .m-topbar-title{font-size:15px;font-weight:700;flex:1;}
  .m-topbar-brand{display:flex;align-items:center;gap:8px;}
  .m-tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--sidebar-bg);z-index:200;box-shadow:0 -1px 0 rgba(255,255,255,.06);padding-bottom:env(safe-area-inset-bottom);}
  .m-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 4px 8px;cursor:pointer;color:rgba(255,255,255,.45);font-size:10.5px;font-weight:500;user-select:none;transition:color .15s;}
  .m-tab .m-tab-ic{font-size:18px;line-height:1;}
  .m-tab.active{color:var(--teal);}
  .content{padding:14px 14px 84px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:10px;margin-bottom:16px;}
  .kpi-num{font-size:22px;}
  .kpi-card{padding:14px 14px;}
  .page-head{flex-direction:column;gap:12px;margin-bottom:16px;}
  .page-actions .btn{width:100%;justify-content:center;}
  .tbl-wrap{display:none;}
  .mc-list{display:block;}
  .dash-welcome{padding:20px;}
  .dash-welcome h2{font-size:17px;}
  .modal{border-radius:var(--r-xl) var(--r-xl) 0 0;max-width:100%;margin:0;max-height:92vh;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal-wide{max-width:100%;}
  .modal-xl{max-width:100%;}
  .card-header{padding:14px 16px;flex-wrap:wrap;}
  .card-body{padding:16px;}
  .field-row{grid-template-columns:1fr;}
  .search-bar{flex-direction:column;align-items:stretch;}
  .search-wrap{max-width:100%;}
  .modal-footer{flex-wrap:wrap;padding:12px 16px 16px;}
  .modal-footer .btn{flex:1 1 auto;min-width:calc(50% - 4px);justify-content:center;font-size:12px;padding:9px 8px;}
  .qform-grid{grid-template-columns:1fr;}
  .qi-header{display:none;}
  .qi-row{display:flex;flex-direction:column;gap:6px;padding:10px 10px 12px;border-bottom:1px solid var(--line);background:var(--surface);}
  .qi-row .qi-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
  .qi-row .qi-name-wrap{display:flex;flex-direction:column;gap:4px;}
  .qi-row .qi-price-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .qi-row .qi-amt{grid-column:1/-1;padding-top:4px;border-top:1px dashed var(--line);font-size:13px;font-weight:700;text-align:right;}
  .qi-label{font-size:10px;font-weight:700;color:var(--ink-5);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;display:block;}
  .qdoc{padding:14px 12px;font-size:11px;}
  .qdoc-header{flex-direction:column;gap:8px;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;}
  .qdoc-logo{height:34px;}
  .qdoc-title-block{text-align:left;}
  .qdoc-title{font-size:17px;}
  .qdoc-meta-grid{grid-template-columns:1fr;margin-bottom:12px;}
  .qdoc-meta-grid .qdoc-meta-col:first-child{border-bottom:2px solid #1a73c8;}
  .qdoc-meta-label{min-width:74px;padding:6px 9px;font-size:10px;}
  .qdoc-meta-val{padding:6px 9px;font-size:11px;}
  .qdoc-items-table{font-size:10px;}
  .qdoc-items-table th,.qdoc-items-table td{padding:5px 5px;}
  .qdoc-items-table .col-spec{display:none;}
  .qdoc-total-label{min-width:80px;padding:6px 10px;font-size:11px;}
  .qdoc-total-val{min-width:100px;padding:6px 10px;font-size:11px;}
  .qdoc-total-row.grand .qdoc-total-val{font-size:13px;}
  .qdoc-footer{flex-direction:column;gap:10px;align-items:flex-start;}
  .qdoc-amount-box{flex-direction:column;align-items:flex-start;gap:4px;padding:10px 12px;}
  .qdoc-amount-box .qdoc-amount-label{font-size:11px;}
  .qdoc-amount-box .qdoc-amount-val{font-size:16px!important;}
  .as-tab{font-size:11px;padding:7px 4px;}
  .as-tabs{gap:1px;}
  .quote-preview-actions .btn{font-size:12px;padding:8px 10px;}
  .quote-preview-content{padding:8px 6px;}
  .stat-rank-label{width:88px;font-size:11px;}
  .stat-mini-table{font-size:11px;}
  .brand-grid{grid-template-columns:1fr;}
}

::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--ink-5);}

function toDate(v){
  if(!v)return null;
  if(typeof v.toDate==="function")return v.toDate();
  const d=new Date(v);return isNaN(d)?null:d;
}
function fmtDate(v){
  const d=toDate(v);if(!d)return"-";
  return d.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"});
}
function fmtDatetime(v){
  const d=toDate(v);if(!d)return"-";
  return d.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function calcAS(contractStart,maintenancePeriod){
  if(!contractStart||!maintenancePeriod)return{type:"알수없음",expireDate:null,daysLeft:null};
  const start=new Date(contractStart);if(isNaN(start))return{type:"알수없음",expireDate:null,daysLeft:null};
  let totalMonths=0;
  const mp=String(maintenancePeriod).trim();
  const yearMatch=mp.match(/(\d+\.?\d*)\s*년/);const monthMatch=mp.match(/(\d+\.?\d*)\s*개?월/);
  if(yearMatch)totalMonths+=parseFloat(yearMatch[1])*12;
  if(monthMatch)totalMonths+=parseFloat(monthMatch[1]);
  if(!yearMatch&&!monthMatch){const n=parseFloat(mp);if(!isNaN(n))totalMonths=n;}
  if(totalMonths<=0)return{type:"알수없음",expireDate:null,daysLeft:null};
  const expire=new Date(start);expire.setMonth(expire.getMonth()+Math.floor(totalMonths));
  const remainDays=Math.ceil((expire-new Date())/86400000);
  return{type:remainDays>0?"무상":"유상",expireDate:expire,daysLeft:remainDays};
}

function bAS(cs,mp){
  const{type,daysLeft}=calcAS(cs,mp);
  if(type==="알수없음")return`<span class="badge b-ready">-</span>`;
  if(type==="무상"){
    if(daysLeft<=30)return`<span class="badge b-warn-soon">⚠️ 무상 (${daysLeft}일 후 만료)</span>`;
    return`<span class="badge b-free">✅ 무상</span>`;
  }
  return`<span class="badge b-paid">💰 유상</span>`;
}
function asExpireText(cs,mp){
  const{type,expireDate,daysLeft}=calcAS(cs,mp);
  if(!expireDate)return"";
  const fmt=expireDate.toLocaleDateString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"});
  if(type==="유상")return`<span class="maint-exp expired">만료: ${fmt}</span>`;
  if(daysLeft<=30)return`<span class="maint-exp soon">만료: ${fmt} (${daysLeft}일 남음)</span>`;
  return`<span class="maint-exp">만료: ${fmt}</span>`;
}

/* ════ D-day 계산 ════ */
function calcDday(dateStr){
  if(!dateStr)return null;
  const target=new Date(dateStr);target.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  return Math.round((target-today)/86400000);
}
function ddayBadge(dateStr){
  const d=calcDday(dateStr);
  if(d===null)return"";
  if(d===0)return`<span class="dday dday-today">D-day</span>`;
  if(d>0&&d<=3)return`<span class="dday dday-soon">D-${d}</span>`;
  if(d>3)return`<span class="dday dday-future">D-${d}</span>`;
  return`<span class="dday dday-past">D+${Math.abs(d)}</span>`;
}

function actionTag(t){

  const m={"현장 방문 수리":"at-visit 🔧","원격 진단·지원":"at-remote 📡","부품 교체":"at-parts 🔩","소프트웨어 업데이트":"at-sw 💻","예방 점검":"at-check 🔍"};
  const cls=m[t]||"at-check";const parts=cls.split(" ");
  return`<span class="action-tag ${parts[0]}">${parts[1]||""} ${esc(t)}</span>`;
}

  document.getElementById("mc-x").onclick=close;
  document.getElementById("mc-cancel").onclick=close;
  $overlay.onclick=e=>{if(e.target===$overlay)close();};
  const doSave=async()=>{
    const data={},flds=fields.filter(f=>!f.hidden);let ok=true;
    flds.forEach(f=>{
      const el=document.getElementById("f_"+f.key);if(!el)return;
      const v=el.value.trim();const wrap=el.closest(".field");
      if(f.req&&!v){wrap?.classList.add("invalid");ok=false;}
      else wrap?.classList.remove("invalid");
      data[f.key]=v;
    });
    if(!ok)return;
    const btn=document.getElementById("mc-save");
    btn.disabled=true;btn.textContent="저장 중…";
    try{await onSave(data);close();}
    catch(err){console.error(err);toast("저장 실패","error");btn.disabled=false;btn.textContent="저장";}
  };
  document.getElementById("mc-save").onclick=doSave;
  document.getElementById("mForm").onsubmit=e=>{e.preventDefault();doSave();};
}

function buildFields(fields,vals){
  const rows=[];let i=0;
  while(i<fields.length){
    if(fields[i].hidden){i++;continue;}
    if(fields[i].pair&&fields[i+1]&&!fields[i+1].hidden){
      rows.push(`<div class="field-row">${fld(fields[i],vals)}${fld(fields[i+1],vals)}</div>`);i+=2;
    }else{rows.push(fld(fields[i],vals));i++;}
  }
  return rows.join("");
}
function fld(f,vals){
  const val=esc(vals[f.key]||"");
  let inner;
  if(f.type==="select"){
    inner=`<select id="f_${f.key}" name="${f.key}"><option value="">선택</option>${f.opts.map(o=>`<option value="${esc(o)}"${vals[f.key]===o?" selected":""}>${esc(o)}</option>`).join("")}</select>`;
  }else if(f.type==="textarea"){
    inner=`<textarea id="f_${f.key}" name="${f.key}" rows="${f.rows||3}" placeholder="${esc(f.ph||"")}">${val}</textarea>`;
  }else{
    inner=`<input id="f_${f.key}" name="${f.key}" type="${f.type||"text"}" value="${val}" autocomplete="off" placeholder="${esc(f.ph||"")}"/>`;
  }
  return`<div class="field"><label for="f_${f.key}">${esc(f.label)}${f.req?` <span style='color:var(--rose)'>*</span>`:""}</label>${inner}<div class="ferr">${esc(f.err||"필수 입력")}</div></div>`;
}

window._switchDetailTab=function(tabId){
  document.querySelectorAll(".as-tab").forEach((el,i)=>{
    const tabs=["symptom","cause","action","complete"];
    el.classList.toggle("active",tabs[i]===tabId);
  });
  document.querySelectorAll(".as-tab-panel").forEach(el=>{
    el.classList.toggle("active",el.id==="dp_"+tabId);
  });
};

window._toggleCheck=function(idx,val){
  const task=tasks.find(t=>t.id===_detailTaskId);if(!task)return;
  const checklist=task.checklist?{...task.checklist}:{};
  checklist[idx]=val;
  const wrap=document.getElementById("chkwrap_"+idx);
  if(wrap)wrap.classList.toggle("done-item",val);
  updateDoc(doc(db,COL.tasks,_detailTaskId),{checklist}).catch(e=>console.error(e));
};

let quoteItems=[],quoteTaskId=null;
function quoteItemsTotal(){return quoteItems.reduce((s,it)=>s+((parseInt(it.qty)||0)*(parseInt(it.unitPrice)||0)),0);}

window._openQuoteModal=function(taskId){
  const task=tasks.find(t=>t.id===taskId);
  if(!task){toast("접수 정보를 찾을 수 없습니다","error");return;}
  quoteTaskId=taskId;
  const linkedSite=site.find(s=>s.name===task.siteName);
  const asResult=linkedSite?calcAS(linkedSite.contractStart,linkedSite.maintenancePeriod):{type:"알수없음"};
  quoteItems=(task.quoteItems&&task.quoteItems.length>0)?JSON.parse(JSON.stringify(task.quoteItems)):[{id:Date.now(),name:"",spec:"",qty:1,unit:"식",unitPrice:0}];
  const today=new Date().toISOString().slice(0,10);
  const quoteNo=task.quoteNo||`Q-${today.replace(/-/g,"")}-${taskId.slice(-4).toUpperCase()}`;
  $modal.className="modal modal-wide";
  $overlay.classList.remove("hidden");
  _renderQuoteModal(task,linkedSite,asResult,quoteNo,today);
};

function _renderQiRows(){
  const el=document.getElementById("qiRows");if(!el)return;
  if(quoteItems.length===0)quoteItems=[{id:Date.now(),name:"",spec:"",qty:1,unit:"식",unitPrice:0}];
  if(isMobile()){
    el.innerHTML=quoteItems.map((it,idx)=>{
      const amt=(parseInt(it.qty)||0)*(parseInt(it.unitPrice)||0);
      return`<div class="qi-row" id="qirow_${it.id}">
        <div class="qi-item-header"><span style="font-size:11px;font-weight:700;color:var(--ink-5);">품목 ${idx+1}</span><button class="qi-del" onclick="window._qiDelete(${it.id})">✕ 삭제</button></div>
        <div class="qi-name-wrap">
          <div><span class="qi-label">품목명</span><input type="text" placeholder="품목명 *" value="${esc(it.name)}" oninput="window._qiUpdate(${it.id},'name',this.value)"/></div>
          <div><span class="qi-label">규격/사양</span><input type="text" placeholder="규격/사양" value="${esc(it.spec||"")}" oninput="window._qiUpdate(${it.id},'spec',this.value)"/></div>
        </div>
        <div class="qi-price-row">
          <div><span class="qi-label">단위</span><input type="text" value="${esc(it.unit||'식')}" style="text-align:center;" oninput="window._qiUpdate(${it.id},'unit',this.value)"/></div>
          <div><span class="qi-label">수량</span><input type="number" min="1" value="${it.qty||1}" style="text-align:center;" oninput="window._qiUpdate(${it.id},'qty',this.value)"/></div>
          <div><span class="qi-label">단가(원)</span><input type="number" min="0" value="${it.unitPrice||0}" style="text-align:right;" oninput="window._qiUpdate(${it.id},'unitPrice',this.value)"/></div>
          <div class="qi-amt" id="qiamt_${it.id}">금액: ${amt.toLocaleString("ko-KR")}원</div>
        </div>
      </div>`;
    }).join("");
  }else{
    el.innerHTML=quoteItems.map((it)=>{
      const amt=(parseInt(it.qty)||0)*(parseInt(it.unitPrice)||0);
      return`<div class="qi-row" id="qirow_${it.id}">
        <div style="display:flex;flex-direction:column;gap:3px;">
          <input type="text" placeholder="품목명 *" value="${esc(it.name)}" oninput="window._qiUpdate(${it.id},'name',this.value)"/>
          <input type="text" placeholder="규격/사양" value="${esc(it.spec||"")}" style="font-size:11px;padding:4px 7px;border:1px dashed var(--line);background:var(--bg);" oninput="window._qiUpdate(${it.id},'spec',this.value)"/>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <input type="number" min="1" value="${it.qty||1}" style="text-align:center;" oninput="window._qiUpdate(${it.id},'qty',this.value)"/>
          <input type="text" placeholder="단위" value="${esc(it.unit||'식')}" style="font-size:11px;padding:4px 7px;text-align:center;" oninput="window._qiUpdate(${it.id},'unit',this.value)"/>
        </div>
        <input type="number" min="0" value="${it.unitPrice||0}" placeholder="단가" style="text-align:right;" oninput="window._qiUpdate(${it.id},'unitPrice',this.value)"/>
        <div class="qi-amt" id="qiamt_${it.id}">${amt.toLocaleString("ko-KR")}</div>
        <button class="qi-del" onclick="window._qiDelete(${it.id})">✕</button>
      </div>`;
    }).join("");
  }
  _updateQiSummary();
}
window._qiUpdate=function(id,field,value){
  const it=quoteItems.find(x=>x.id===id);if(!it)return;
  it[field]=field==="qty"||field==="unitPrice"?parseInt(value)||0:value;
  const amt=it.qty*it.unitPrice;
  const amtEl=document.getElementById("qiamt_"+id);
  if(amtEl)amtEl.textContent=isMobile()?`금액: ${amt.toLocaleString("ko-KR")}원`:amt.toLocaleString("ko-KR");
  _updateQiSummary();
};
window._addQiRow=function(){quoteItems.push({id:Date.now(),name:"",spec:"",qty:1,unit:"식",unitPrice:0});_renderQiRows();};
window._qiDelete=function(id){
  if(quoteItems.length<=1){toast("최소 1개 품목이 필요합니다","error");return;}
  quoteItems=quoteItems.filter(x=>x.id!==id);_renderQiRows();
};
function _updateQiSummary(){
  const supply=quoteItemsTotal();const vat=Math.round(supply*0.1);const total=supply+vat;
  const s=document.getElementById("qSummarySupply");const v=document.getElementById("qSummaryVat");const t=document.getElementById("qSummaryTotal");
  if(s)s.textContent=supply.toLocaleString("ko-KR")+"원";
  if(v)v.textContent=vat.toLocaleString("ko-KR")+"원";
  if(t)t.textContent=total.toLocaleString("ko-KR")+"원";
}
function _gatherQuoteData(){
  const g=id=>document.getElementById(id)?.value.trim()||"";
  return{
    quoteNo:g("qf_quoteNo"),quoteDate:g("qf_quoteDate"),quoteValidUntil:g("qf_validUntil"),
    quoteDeliveryDate:g("qf_deliveryDate"),quoteRecipient:g("qf_recipient"),
    quoteContactPerson:g("qf_contactPerson"),quoteTitle:g("qf_title"),
    quoteSiteAddr:g("qf_siteAddr"),quoteAsType:g("qf_asType"),
    quotePaymentTerm:g("qf_paymentTerm"),quoteInstallCond:g("qf_installCond"),
    quoteNotes:g("qf_notes"),quoteItems:JSON.parse(JSON.stringify(quoteItems)),
  };
}
window._saveQuote=async function(silent=false){
  if(!quoteTaskId)return;
  try{await updateDoc(doc(db,COL.tasks,quoteTaskId),_gatherQuoteData());if(!silent)toast("저장되었습니다","success");}
  catch(e){console.error(e);if(!silent)toast("저장 실패","error");}
};

window._previewQuote=async function(){
  await window._saveQuote(true);
  const data=_gatherQuoteData();const task=tasks.find(t=>t.id===quoteTaskId);if(!task)return;
  const html=_buildQuoteHTML(data,task);
  if(isMobile()){
    const overlay=document.getElementById("quotePreviewOverlay");
    document.getElementById("quotePreviewContent").innerHTML=html;
    overlay.classList.add("active");overlay.scrollTop=0;
    $overlay.classList.add("hidden");
  }else{
    const pa=document.getElementById("quotePrintArea");
    pa.style.cssText="display:block;position:fixed;inset:0;z-index:9998;background:#fff;overflow:auto;padding:20px;";
    pa.innerHTML=`<div style="max-width:820px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;" class="no-print">
        <div style="font-size:15px;font-weight:700;">견적서 미리보기</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary no-print" onclick="window._printQuote()">🖨️ 인쇄/PDF</button>
          <button class="btn btn-secondary no-print" onclick="document.getElementById('quotePrintArea').style.display='none'">✕ 닫기</button>
        </div>
      </div>${html}</div>`;
  }
};
window._closeQuotePreview=function(){document.getElementById("quotePreviewOverlay").classList.remove("active");};
window._printQuote=async function(){
  await window._saveQuote(true);
  const data=_gatherQuoteData();const task=tasks.find(t=>t.id===quoteTaskId);if(!task)return;
  document.getElementById("quotePreviewOverlay").classList.remove("active");
  const pa=document.getElementById("quotePrintArea");
  pa.style.cssText="display:block;";pa.innerHTML=_buildQuoteHTML(data,task);
  setTimeout(()=>{window.print();setTimeout(()=>{pa.style.display="none";},800);},200);
};

  {key:"client",label:"고객사",req:true},
  {key:"equipment",label:"장비",ph:"장비명 입력",pair:true},
  {key:"quantity",label:"수량",type:"number",pair:true},
  {key:"serial",label:"시리얼",ph:"시리얼번호 직접 입력",pair:true},
  {key:"contractType",label:"계약 방식",type:"select",opts:["신규","유지보수","연장","렌탈","판매"],pair:true},
  {key:"contractStart",label:"계약 시작",type:"date",pair:true},
  {key:"contractEnd",label:"계약 종료",type:"date",pair:true},
  {key:"maintenancePeriod",label:"유지보수 기간",ph:"예: 12개월, 2년, 1년6개월"},
  {key:"pm",label:"담당 PM",req:true},
];
window._openAddSite=()=>openModal({title:"신규 현장 등록",fields:SITE_FIELDS,hint:"계약 시작일과 유지보수 기간 입력 시 AS 구분이 자동 산출됩니다.",
  onSave:async d=>{await addDoc(collection(db,COL.site),{...d,status:"준비",createdAt:serverTimestamp()});toast("현장이 등록되었습니다","success");}});
window._openEditSite=id=>{
  const s=site.find(x=>x.id===id);if(!s)return;
  openModal({title:"현장 수정",fields:SITE_FIELDS,values:s,
    onSave:async d=>{await updateDoc(doc(db,COL.site,id),d);toast("수정되었습니다","success");}});
};
window._updateSiteStatus=async(id,status)=>{
  try{await updateDoc(doc(db,COL.site,id),{status});toast(`상태: ${status}`);}
  catch(e){toast("변경 실패","error");}
};
function renderSiteResults(){
  const q=sq.site;const list=site.filter(s=>match(q,[s.name,s.client,s.equipment,s.serial,s.pm,s.contractType]));
  const ra=document.getElementById("siteRA");const ma=document.getElementById("sm_site");
  if(!ra)return;if(ma)ma.textContent=q?`${list.length}건 검색됨`:"";
  if(!list.length){ra.innerHTML=noResults(q);return;}
  const tBody=list.map(s=>`<tr>
    <td style="font-weight:600;">${esc(s.name)}</td><td>${esc(s.client)}</td>
    <td>${esc(s.equipment)||"-"}</td><td>${esc(s.quantity)||"-"}</td>
    <td style="font-family:monospace;">${esc(s.serial)||"-"}</td>
    <td>${bContract(s.contractType)}</td><td>${esc(s.contractStart)||"-"}</td>
    <td>${esc(s.contractEnd)||"-"}</td>
    <td><div style="line-height:1.3;">${esc(s.maintenancePeriod)||"-"}${asExpireText(s.contractStart,s.maintenancePeriod)}</div></td>
    <td>${esc(s.pm)||"-"}</td><td>${bSite(s.status)}</td>
    <td>${bAS(s.contractStart,s.maintenancePeriod)}</td>
    <td><div class="td-actions">
      <button class="btn-icon edit" onclick="_openEditSite('${s.id}')">✏️</button>
      <button class="btn btn-sm btn-secondary" onclick="_updateSiteStatus('${s.id}','진행')">진행</button>
      <button class="btn btn-sm" style="background:var(--rose-lt);color:var(--rose);" onclick="_updateSiteStatus('${s.id}','만료')">만료</button>
    </div></td>
  </tr>`).join("");
  const mCards=list.map(s=>`<div class="mc">
    <div class="mc-head" onclick="_toggleMC('s${s.id}')">
      <div class="mc-title"><div class="mc-name">${esc(s.name)}</div><div class="mc-sub">${esc(s.client)} · PM: ${esc(s.pm)||"-"}</div></div>
      <div class="mc-badges">${bContract(s.contractType)}${bAS(s.contractStart,s.maintenancePeriod)}${bSite(s.status)}</div>
      <span class="mc-chevron" id="mcc_s${s.id}">▼</span>
    </div>
    <div class="mc-body" id="mcb_s${s.id}">
      <hr class="mc-divider"/>
      <div class="mc-fields">
        <div class="mc-field"><span class="mc-label">장비</span><span class="mc-val">${esc(s.equipment)||"-"}</span></div>
        <div class="mc-field"><span class="mc-label">시리얼</span><span class="mc-val">${esc(s.serial)||"-"}</span></div>
        <div class="mc-field"><span class="mc-label">계약기간</span><span class="mc-val">${esc(s.contractStart)||"-"} ~ ${esc(s.contractEnd)||"-"}</span></div>
        <div class="mc-field"><span class="mc-label">유지보수</span><span class="mc-val">${esc(s.maintenancePeriod)||"-"}${asExpireText(s.contractStart,s.maintenancePeriod)}</span></div>
        <div class="mc-field"><span class="mc-label">AS 구분</span><span class="mc-val">${bAS(s.contractStart,s.maintenancePeriod)}</span></div>
      </div>
      <div class="mc-actions">
        <button class="btn btn-secondary btn-sm" onclick="_openEditSite('${s.id}')">✏️ 수정</button>
        <button class="btn btn-secondary btn-sm" onclick="_updateSiteStatus('${s.id}','진행')">진행</button>
        <button class="btn btn-sm" style="background:var(--rose-lt);color:var(--rose);" onclick="_updateSiteStatus('${s.id}','만료')">만료</button>
      </div>
    </div>
  </div>`).join("");
  ra.innerHTML=`<div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th>현장명</th><th>고객사</th><th>장비</th><th>수량</th><th>시리얼</th><th>계약방식</th>
    <th>계약시작</th><th>계약종료</th><th>유지보수기간</th><th>PM</th>
    <th>상태</th><th style="color:var(--teal-dk);">AS 구분</th><th>관리</th>
  </tr></thead><tbody>${tBody}</tbody></table></div>
  <div class="mc-list">${mCards}</div>`;
}
_renderers.site=renderSiteResults;
function renderSite(){
  const total=site.length;const progress=site.filter(s=>s.status==="진행").length;const expired=site.filter(s=>s.status==="만료").length;
  const asStats=site.reduce((acc,s)=>{
    const{type,daysLeft}=calcAS(s.contractStart,s.maintenancePeriod);
    if(type==="무상")acc.free++;else if(type==="유상")acc.paid++;else acc.unknown++;
    if(type==="무상"&&daysLeft!==null&&daysLeft<=30)acc.soon++;
    return acc;
  },{free:0,paid:0,unknown:0,soon:0});
  $content.innerHTML=`
    <div class="page-head">
      <div><div class="page-title">Site Master</div><div class="page-subtitle">등록된 현장을 관리합니다</div></div>
      <div class="page-actions"><button class="btn btn-primary" onclick="_openAddSite()">+ 현장 등록</button></div>
    </div>
    <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);">
      ${kpiHtml(total,"전체 현장","c-teal")}${kpiHtml(progress,"진행 중","c-blue")}
      ${kpiHtml(expired,"만료","c-amber")}
      ${kpiHtml(asStats.free,"무상 AS","c-green",asStats.soon>0?`⚠️ ${asStats.soon}건 임박`:"")}
      ${kpiHtml(asStats.paid,"유상 AS","c-rose")}
    </div>
    ${asStats.soon>0?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:var(--r-lg);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;"><span style="font-size:18px;">⏰</span><span>무상 AS 만료 임박 현장이 <strong>${asStats.soon}건</strong> 있습니다.</span></div>`:""}
    ${!site.length?`<div class="card"><div class="card-body">${empty("🏗️","등록된 현장이 없습니다","+ 현장 등록 버튼으로 추가해보세요")}</div></div>`:`
    <div class="card">
      <div class="card-header"><div class="card-title">현장 목록</div></div>
      <div class="card-body">${searchBox("site","현장명, 고객사, 장비, 시리얼, PM으로 검색")}<div id="siteRA"></div></div>
    </div>`}`;
  renderSiteResults();
}

/* ════════════════════════════════════
   PROJECT
════════════════════════════════════ */
const PROJ_FIELDS=[
  {key:"siteName",label:"현장명",type:"select",opts:[],req:true,err:"현장을 선택해주세요"},
  {key:"receiptDate",label:"접수일자",type:"date",req:true},
  {key:"symptom",label:"접수 증상",req:true,ph:"증상을 간략히 입력"},
  {key:"manager",label:"담당자",ph:"이름",pair:true},
  {key:"phone",label:"연락처",type:"tel",pair:true},
  {key:"pm",label:"담당 PM"},
];
function projFields(){return PROJ_FIELDS.map(f=>f.key==="siteName"?{...f,opts:site.map(s=>s.name).filter(Boolean)}:f);}
window._openAddProject=()=>{
  if(!site.length){toast("먼저 Site 메뉴에서 현장을 등록해주세요","error");return;}
  openModal({title:"신규 접수 등록",fields:projFields(),
    onSave:async d=>{await addDoc(collection(db,COL.tasks),{...d,status:"접수",createdAt:serverTimestamp(),completedAt:null,processTime:0});toast("접수가 등록되었습니다","success");}});
};
window._openEditProject=id=>{
  const t=tasks.find(x=>x.id===id);if(!t)return;
  openModal({title:"접수 수정",fields:projFields(),values:t,
    onSave:async d=>{await updateDoc(doc(db,COL.tasks,id),d);toast("수정되었습니다","success");}});
};
window._completeProject=async id=>{
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const start=t.createdAt?toDate(t.createdAt):new Date();
  const hrs=Math.max(0,Math.round((new Date()-start)/3600000));
  const linkedSite=site.find(s=>s.name===t.siteName);
  const asType=linkedSite?calcAS(linkedSite.contractStart,linkedSite.maintenancePeriod).type:"알수없음";
  try{
    await updateDoc(doc(db,COL.tasks,id),{status:"완료",completedAt:serverTimestamp(),processTime:hrs,asType});
    $overlay.classList.add("hidden");
    toast(`완료 처리 완료 · 처리시간 ${hrs}시간 · AS: ${asType}`,"success");
  }catch(e){toast("처리 실패","error");}
};
window._projSortBy=col=>{
  if(projSort.col===col){projSort.dir=projSort.dir==="asc"?"desc":"asc";}
  else{projSort.col=col;projSort.dir=col==="receiptDate"?"desc":"asc";}
  renderProjectResults();
};
function sortIcon(col){
  if(projSort.col!==col)return`<span style="opacity:.3;font-size:10px;margin-left:3px;">↕</span>`;
  return projSort.dir==="asc"?`<span style="color:var(--teal);font-size:10px;margin-left:3px;">↑</span>`:`<span style="color:var(--teal);font-size:10px;margin-left:3px;">↓</span>`;
}
function getSiteAS(siteName){const s=site.find(x=>x.name===siteName);return s?bAS(s.contractStart,s.maintenancePeriod):"";}

function renderProjectResults(){
  const q=sq.project;
  let list=tasks.filter(t=>match(q,[t.siteName,t.symptom,t.manager,t.phone,t.pm,t.causeType,t.actionType]));
  const ra=document.getElementById("projRA");const ma=document.getElementById("sm_project");
  if(!ra)return;if(ma)ma.textContent=q?`${list.length}건 검색됨`:"";
  if(!list.length){ra.innerHTML=noResults(q);return;}
  list=list.slice().sort((a,b)=>{
    const dA=a.status==="완료"?1:0,dB=b.status==="완료"?1:0;
    if(dA!==dB)return dA-dB;
    let va=a[projSort.col]||"",vb=b[projSort.col]||"";
    const cmp=va<vb?-1:va>vb?1:0;return projSort.dir==="asc"?cmp:-cmp;
  });
  const pendingCount=list.filter(t=>t.status!=="완료").length;
  const doneCount=list.length-pendingCount;
  const thSort=(col,label)=>`<th style="cursor:pointer;user-select:none;white-space:nowrap;" onclick="_projSortBy('${col}')">${label}${sortIcon(col)}</th>`;

  let _pendingSeq=0,_doneSeq=0;
  const tBodyRows=list.map((t,idx)=>{
    const isDone=t.status==="완료";
    if(isDone)_doneSeq++;else _pendingSeq++;
    const seqNum=isDone?_doneSeq:_pendingSeq;
    const sep=(isDone&&idx===pendingCount&&doneCount>0)
      ?`<tr><td colspan="14" style="padding:4px 14px;background:var(--bg-2);font-size:11.5px;color:var(--ink-5);font-weight:600;letter-spacing:.4px;border-bottom:2px solid var(--line);">처리 완료 ${doneCount}건</td></tr>`:"";
    const visitBadge=t.visitDate?ddayBadge(t.visitDate):"";
    const actionIcon=t.actionType?`<div style="margin-top:3px;">${actionTag(t.actionType)}</div>`:"";
    return sep+`<tr style="${isDone?"opacity:.62;":""}">
      <td style="text-align:center;font-size:12px;color:var(--ink-5);font-weight:700;width:42px;">${seqNum}</td>
      <td style="font-weight:600;">${esc(t.siteName)||"-"}</td>
      <td>${esc(t.receiptDate)||"-"}</td>
      <td style="width:180px;min-width:180px;max-width:220px;white-space:normal;word-break:keep-all;line-height:1.4;">${esc(t.symptom)}</td>
      <td>${esc(t.manager)||"-"}</td>
      <td>${esc(t.phone)||"-"}</td>
      <td>${esc(t.pm)||"-"}</td>
      <td>${bTask(t.status)}</td>
      <td>${getSiteAS(t.siteName)}</td>
      <td>
        <div>${t.causeType?`<span style="font-size:12px;color:var(--ink-3);">${esc(t.causeType)}</span>`:`<span style="color:var(--ink-5);font-size:11px;">미입력</span>`}</div>
        ${actionIcon}
      </td>
      <td>
        ${t.visitDate?`<div style="font-size:12px;font-weight:600;color:var(--blue);">${esc(t.visitDate)}</div><div>${visitBadge} ${esc(t.visitTime||"")}</div>`:`<span style="color:var(--ink-5);font-size:11px;">미정</span>`}
      </td>
      <td>${t.processTime||0}h</td>
      <td>
        ${t.quoteItems&&t.quoteItems.length>0
          ?`<span class="badge b-done" style="font-size:11px;cursor:pointer;" onclick="_openQuoteModal('${t.id}')">📋 완료</span>`
          :`<button class="btn btn-sm" style="background:var(--blue-lt);color:var(--blue);font-weight:700;font-size:11px;border:1px solid rgba(37,99,235,.2);" onclick="_openQuoteModal('${t.id}')">📋 견적서</button>`}
      </td>
      <td>
        <div class="td-actions">
          <button class="btn btn-sm btn-primary" style="font-size:11px;" onclick="_openDetailModal('${t.id}')">📂 상세</button>
          <button class="btn-icon edit" onclick="_openEditProject('${t.id}')">✏️</button>
          ${!isDone?`<button class="btn btn-sm btn-primary" onclick="_completeProject('${t.id}')">완료</button>`:""}
        </div>
      </td>
    </tr>`;
  }).join("");

  let _mcPendingSeq=0,_mcDoneSeq=0;
  const mCards=list.map((t,idx)=>{
    const isDone=t.status==="완료";
    if(isDone)_mcDoneSeq++;else _mcPendingSeq++;
    const divH=(isDone&&idx===pendingCount&&doneCount>0)?`<div style="text-align:center;font-size:11.5px;color:var(--ink-5);font-weight:600;padding:6px 0 2px;">── 처리 완료 ${doneCount}건 ──</div>`:"";
    const hasQuote=t.quoteItems&&t.quoteItems.length>0;
    const visitBadge=t.visitDate?`<div style="font-size:11.5px;color:var(--blue);font-weight:600;margin-top:2px;">📅 ${esc(t.visitDate)} ${esc(t.visitTime||"")} ${ddayBadge(t.visitDate)}</div>`:"";
    return`${divH}
    <div class="mc" style="${isDone?"opacity:.65;":""}">
      <div class="mc-head" onclick="_toggleMC('t${t.id}')">
        <div class="mc-title">
          <div class="mc-name"><span style="display:inline-block;background:var(--bg-2);color:var(--ink-5);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-right:5px;">${isDone?_mcDoneSeq:_mcPendingSeq}</span>${esc(t.siteName)||"미등록 현장"}</div>
          <div class="mc-sub">${esc(t.receiptDate)||"-"} · ${esc(t.symptom)||"-"}</div>
          ${visitBadge}
        </div>
        <div class="mc-badges">${bTask(t.status)}${getSiteAS(t.siteName)}${hasQuote?`<span class="badge b-done" style="font-size:11px;">📋</span>`:""}</div>
        <span class="mc-chevron" id="mcc_t${t.id}">▼</span>
      </div>
      <div class="mc-body" id="mcb_t${t.id}">
        <hr class="mc-divider"/>
        <div class="mc-fields">
          <div class="mc-field"><span class="mc-label">접수일</span><span class="mc-val">${esc(t.receiptDate)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">AS 구분</span><span class="mc-val">${getSiteAS(t.siteName)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">담당자</span><span class="mc-val">${esc(t.manager)||"-"} ${esc(t.phone||"")}</span></div>
          <div class="mc-field"><span class="mc-label">PM</span><span class="mc-val">${esc(t.pm)||"-"}</span></div>
          <div class="mc-field"><span class="mc-label">원인</span><span class="mc-val">${t.causeType?esc(t.causeType):"<span style='color:var(--ink-5);font-size:11px;'>미입력</span>"}</span></div>
          <div class="mc-field"><span class="mc-label">조치유형</span><span class="mc-val">${t.actionType?actionTag(t.actionType):"<span style='color:var(--ink-5);font-size:11px;'>미입력</span>"}</span></div>
          <div class="mc-field"><span class="mc-label">방문일</span><span class="mc-val">${t.visitDate?`${esc(t.visitDate)} ${esc(t.visitTime||"")} ${ddayBadge(t.visitDate)}`:"<span style='color:var(--ink-5);font-size:11px;'>미정</span>"}</span></div>
          <div class="mc-field"><span class="mc-label">처리시간</span><span class="mc-val">${t.processTime||0}h</span></div>
          <div class="mc-field"><span class="mc-label">견적서</span><span class="mc-val">${hasQuote?"✅ 작성완료":"미작성"}</span></div>
        </div>
        <div class="mc-actions">
          <button class="btn btn-primary btn-sm" onclick="_openDetailModal('${t.id}')">📂 AS 이력카드</button>
          <button class="btn btn-sm" style="background:var(--blue-lt);color:var(--blue);" onclick="_openQuoteModal('${t.id}')">📋 견적서</button>
          ${!isDone?`<button class="btn btn-primary btn-sm" onclick="_completeProject('${t.id}')">✅ 완료</button>`:""}
        </div>
      </div>
    </div>`;
  }).join("");

  ra.innerHTML=`
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th style="width:42px;text-align:center;">No</th>
      ${thSort("siteName","현장명")}${thSort("receiptDate","접수일")}
      <th>증상</th><th>담당자</th><th>연락처</th><th>PM</th>
      <th>상태</th>
      <th style="color:var(--teal-dk);">AS 구분</th>
      <th>원인 / 조치유형</th>
      <th style="color:var(--blue);">방문 일정</th>
      <th>처리시간</th>
      <th style="color:var(--blue);">견적서</th>
      <th>관리</th>
    </tr></thead><tbody>${tBodyRows}</tbody></table></div>
    <div class="mc-list">${mCards}</div>`;
}
_renderers.project=renderProjectResults;

function renderProject(){
  const total=tasks.length,done=tasks.filter(t=>t.status==="완료").length;
  const pending=total-done;
  const avg=total?(tasks.reduce((a,b)=>a+(b.processTime||0),0)/total).toFixed(1):"0.0";
  const quoted=tasks.filter(t=>t.quoteItems&&t.quoteItems.length>0).length;
  const visitToday=tasks.filter(t=>t.visitDate&&calcDday(t.visitDate)===0).length;
  const visitSoon=tasks.filter(t=>t.visitDate&&calcDday(t.visitDate)>0&&calcDday(t.visitDate)<=3).length;

  $content.innerHTML=`
    <div class="page-head">
      <div><div class="page-title">Project 접수관리</div><div class="page-subtitle">접수된 현장 요청을 추적합니다</div></div>
      <div class="page-actions"><button class="btn btn-primary" onclick="_openAddProject()">+ 접수 등록</button></div>
    </div>
    ${!site.length?`<div class="no-sites">⚠️ Site 메뉴에서 먼저 현장을 등록해주세요.</div>`:""}
    <div class="kpi-grid" style="grid-template-columns:repeat(6,1fr);">
      ${kpiHtml(total,"전체 접수","c-blue")}
      ${kpiHtml(done,"처리 완료","c-teal")}
      ${kpiHtml(pending,"미처리","c-amber")}
      ${kpiHtml(avg+"h","평균 처리시간","c-violet")}
      ${kpiHtml(visitToday+(visitSoon?`<span style="font-size:13px;color:var(--blue);font-weight:500;margin-left:4px;">(+${visitSoon})</span>`:"")+""  ,"오늘 방문","c-rose",visitSoon>0?`3일 내 ${visitSoon}건 더`:"")}
      ${kpiHtml(quoted,"견적서 발행","c-green")}

/* ════════════════════════════════════
   통계 데이터 계산 (화면 렌더링 + 엑셀 내보내기가 공유하는 단일 소스)
════════════════════════════════════ */
function computePeriodStats(){
  const now=new Date();let data,groups;
  if(statPeriod==="week"){
    const weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-6);weekAgo.setHours(0,0,0,0);
    data=tasks.filter(t=>{const d=toDate(t.createdAt);return d&&d>=weekAgo;});
    const days=[];for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d);}
    groups=days.map(d=>{
      const label=d.toLocaleDateString("ko-KR",{month:"2-digit",day:"2-digit",weekday:"short"});
      const items=data.filter(t=>{const dd=toDate(t.createdAt);return dd&&dd.toDateString()===d.toDateString();});
      return{label,total:items.length,done:items.filter(x=>x.status==="완료").length,time:items.reduce((a,b)=>a+(b.processTime||0),0)};
    });
  }else if(statPeriod==="month"){
    data=tasks.filter(t=>{const d=toDate(t.createdAt);return d&&d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    const wkMap={};
    data.forEach(t=>{const d=toDate(t.createdAt);if(!d)return;const week=Math.ceil(d.getDate()/7);const key=`${week}주차`;if(!wkMap[key])wkMap[key]={label:key,total:0,done:0,time:0};wkMap[key].total++;if(t.status==="완료"){wkMap[key].done++;wkMap[key].time+=(t.processTime||0);}});
    groups=[1,2,3,4,5].map(w=>{const key=`${w}주차`;return wkMap[key]||{label:key,total:0,done:0,time:0};}).filter((_,i)=>i<5);
  }else{
    data=tasks.filter(t=>{const d=toDate(t.createdAt);return d&&d.getFullYear()===now.getFullYear();});
    const mMap={};
    data.forEach(t=>{const d=toDate(t.createdAt);if(!d)return;const key=`${d.getMonth()+1}월`;if(!mMap[key])mMap[key]={label:key,total:0,done:0,time:0};mMap[key].total++;if(t.status==="완료"){mMap[key].done++;mMap[key].time+=(t.processTime||0);}});
    groups=Array.from({length:12},(_,i)=>{const key=`${i+1}월`;return mMap[key]||{label:key,total:0,done:0,time:0};});
  }
  const totalAll=data.length,doneAll=data.filter(x=>x.status==="완료").length;
  const rateAll=totalAll?((doneAll/totalAll)*100).toFixed(1):"0.0";
  const avgAll=totalAll?(data.reduce((a,b)=>a+(b.processTime||0),0)/totalAll).toFixed(1):"0.0";
  const periodLabel=statPeriod==="week"?"이번 주":statPeriod==="month"?"이번 달":"올해";
  return{data,groups,totalAll,doneAll,rateAll,avgAll,periodLabel};
}

function computeCauseStats(periodData){
  const causeMap={};
  periodData.forEach(t=>{if(!t.causeType)return;if(!causeMap[t.causeType])causeMap[t.causeType]=0;causeMap[t.causeType]++;});
  const causeTotal=Object.values(causeMap).reduce((a,b)=>a+b,0);
  const causeEntries=Object.entries(causeMap).sort((a,b)=>b[1]-a[1]);

  const partMap={};
  periodData.forEach(t=>{
    if(!t.faultyPart)return;
    const key=String(t.faultyPart).trim();
    if(!key)return;
    if(!partMap[key])partMap[key]=0;
    partMap[key]++;
  });
  const partEntries=Object.entries(partMap).sort((a,b)=>b[1]-a[1]);

  const errMap={};
  periodData.forEach(t=>{
    if(!t.errorCode)return;
    const key=String(t.errorCode).trim();
    if(!key)return;
    if(!errMap[key])errMap[key]=0;
    errMap[key]++;
  });
  const errEntries=Object.entries(errMap).sort((a,b)=>b[1]-a[1]);

  const noCause=periodData.length-causeTotal;
  return{causeEntries,causeTotal,partEntries,errEntries,noCause};
}

function computeSitePerf(){
  const sMap={};
  tasks.forEach(t=>{const n=t.siteName||"미등록";if(!sMap[n])sMap[n]={total:0,done:0,time:0};sMap[n].total++;if(t.status==="완료")sMap[n].done++;sMap[n].time+=(t.processTime||0);});
  return Object.keys(sMap).map(k=>{
    const s=sMap[k];
    const avg=s.total?(s.time/s.total).toFixed(1):"0.0";
    const rate=s.total?((s.done/s.total)*100).toFixed(0):0;
    const linkedSite=site.find(x=>x.name===k);
    const asRes=linkedSite?calcAS(linkedSite.contractStart,linkedSite.maintenancePeriod):{type:"알수없음"};
    return{name:k,total:s.total,done:s.done,rate,avg,asType:asRes.type,linkedSite};
  });
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;" id="dashGrid">
      <div class="card" style="margin:0;">
        <div class="card-header"><div class="card-title">최근 접수</div><button class="btn btn-ghost btn-sm" onclick="navigate('project')">전체 보기 →</button></div>
        <div class="card-body card-body-flush">
          ${recentTasks.length?`<table class="tbl"><thead><tr><th>현장</th><th>증상</th><th>원인</th><th>상태</th></tr></thead><tbody>
          ${recentTasks.map(t=>`<tr>
            <td style="font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;">${esc(t.siteName)||"-"}</td>
            <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.symptom)||"-"}</td>
            <td style="font-size:11px;color:var(--ink-5);">${esc(t.causeType||"-")}</td>
            <td>${bTask(t.status)}</td>
          </tr>`).join("")}</tbody></table>`:`<div class="empty" style="padding:32px 16px;"><div class="empty-icon" style="font-size:28px">🛠️</div><div class="empty-body">접수 내역이 없습니다</div></div>`}
        </div>
      </div>
      <div class="card" style="margin:0;">
        <div class="card-header"><div class="card-title">AS 현황</div><button class="btn btn-ghost btn-sm" onclick="navigate('site')">현장 보기 →</button></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div style="background:var(--free-lt);border:1px solid rgba(13,148,136,.15);border-radius:var(--r-lg);padding:14px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:var(--free);">${asStats.free}</div>
              <div style="font-size:12px;color:var(--free);font-weight:600;margin-top:3px;">✅ 무상 AS</div>
            </div>
            <div style="background:var(--paid-lt);border:1px solid rgba(220,38,38,.15);border-radius:var(--r-lg);padding:14px;text-align:center;">
              <div style="font-size:24px;font-weight:700;color:var(--paid);">${asStats.paid}</div>
              <div style="font-size:12px;color:var(--paid);font-weight:600;margin-top:3px;">💰 유상 AS</div>
            </div>
          </div>
          ${asStats.soon>0?`<div style="padding:10px 12px;background:var(--warn-lt);border:1px solid rgba(217,119,6,.2);border-radius:var(--r);font-size:12.5px;color:var(--warn);font-weight:600;">⚠️ 30일 내 무상 만료 ${asStats.soon}건</div>`:`<div style="padding:10px 12px;background:var(--teal-lt);border:1px solid rgba(13,148,136,.15);border-radius:var(--r);font-size:12.5px;color:var(--teal-dk);">✅ 임박 만료 현장 없음</div>`}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">최근 이슈</div><button class="btn btn-ghost btn-sm" onclick="navigate('issue')">전체 보기 →</button></div>
      <div class="card-body card-body-flush">
        ${recentIssues.length?`<table class="tbl"><thead><tr><th>이슈</th><th>유형</th><th>상태</th></tr></thead><tbody>
        ${recentIssues.map(i=>`<tr><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;">${esc(i.title)||"-"}</td><td>${bIssueType(i.issueType)}</td><td>${bIssue(i.status)}</td></tr>`).join("")}</tbody></table>`:`<div class="empty" style="padding:32px 16px;"><div class="empty-icon" style="font-size:28px">⚠️</div><div class="empty-body">등록된 이슈가 없습니다</div></div>`}
      </div>
    </div>`;
  const g=document.getElementById("dashGrid");
  if(g&&window.innerWidth<=768)g.style.gridTemplateColumns="1fr";
}

function empty(icon,title,body){return`<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${esc(title)}</div><div class="empty-body">${esc(body)}</div></div>`;}

const PAGES={
  dashboard:{fn:renderDashboard,label:"Dashboard"},
  site:{fn:renderSite,label:"Site Master"},
  project:{fn:renderProject,label:"Project"},
  inventory:{fn:renderInventory,label:"Inventory"},
  statistics:{fn:renderStatistics,label:"Statistics"},
  issue:{fn:renderIssue,label:"Issue"},
};

function render(page){
  curPage=page;const p=PAGES[page]||PAGES.dashboard;
  document.getElementById("topTitle").textContent=p.label;
  document.getElementById("topBreadcrumb").textContent=p.label;
  document.getElementById("mTopTitle").textContent=p.label;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.dataset.page===page));
  document.querySelectorAll(".m-tab").forEach(el=>el.classList.toggle("active",el.dataset.page===page));
  p.fn();
  document.getElementById("content").scrollTop=0;
}
window.navigate=render;

document.querySelectorAll(".nav-item,.m-tab").forEach(el=>{
  el.addEventListener("click",()=>navigate(el.dataset.page));
});

render("dashboard");
</script>
</body>
</html>
