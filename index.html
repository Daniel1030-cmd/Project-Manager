<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMO System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f5f6fa;
}

.sidebar {
    width:260px;
    background:#1e2a44;
    color:white;
    padding-top:20px;
}

.sidebar li {
    padding:14px;
    cursor:pointer;
}

.sidebar li:hover { background:#2c3f66; }
.sidebar li.active { background:#00b894; }

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
}

th { background:#f1f2f6; }

button {
    padding:5px 10px;
    margin:2px;
    cursor:pointer;
}

/* GANTT */
.gantt-row {
    display:flex;
    margin-bottom:8px;
}

.gantt-label {
    width:200px;
}

.gantt-track {
    flex:1;
    height:14px;
    background:#eee;
    position:relative;
}

.gantt-bar {
    position:absolute;
    height:100%;
    background:#3498db;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="dashboard">Dashboard</li>
        <li data-page="site">Site</li>
        <li data-page="project">Project</li>
        <li data-page="gantt">Gantt</li>
        <li data-page="issue">Issue</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    onSnapshot,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= COLLECTION (중요: sites 통일) ================= */
const siteCol = collection(db, "site");
const taskCol = collection(db, "tasks");
const issueCol = collection(db, "issues");

/* ================= STATE ================= */
let site = [];
let tasks = [];
let issues = [];
let current = "dashboard";

const content = document.getElementById("content");
const menu = document.querySelectorAll(".sidebar li");

const user = "PM";

/* ================= REALTIME ================= */
onSnapshot(siteCol, snap => {
    site = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render(current);
});

onSnapshot(taskCol, snap => {
    tasks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render(current);
});

onSnapshot(issueCol, snap => {
    issues = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render(current);
});

/* ================= SITE ADD ================= */
window.addSite = async function () {

    const name = prompt("현장명");
    if(!name) return;

    const client = prompt("고객사");
    const project = prompt("프로젝트");
    const pm = prompt("PM");

    await addDoc(siteCol, {
        name,
        client,
        project,
        pm,
        status:"준비",
        risk:"Low",
        createdAt: serverTimestamp()
    });
};

/* ================= SITE STATUS ================= */
window.updateSitetatus = async function(id, status) {
    await updateDoc(doc(db,"site",id), { status });
};

/* ================= TASK ================= */
window.addTask = async function () {
    const name = prompt("Task 이름");
    if(!name) return;

    await addDoc(taskCol, {
        name,
        start:0,
        duration:10
    });
};

/* ================= ISSUE ================= */
window.addIssue = async function () {
    const title = prompt("Issue");
    if(!title) return;

    await addDoc(issueCol, {
        title,
        status:"New",
        createdAt: serverTimestamp()
    });
};

/* ================= KPI ================= */
function kpi() {
    const closed = issues.filter(i => i.status==="Closed").length;
    return {
        total: issues.length,
        rate: issues.length ? (closed/issues.length*100).toFixed(1) : 0
    };
}

/* ================= GANTT ================= */
function ganttRow(t) {
    return `
        <div class="gantt-row">
            <div class="gantt-label">${t.name}</div>
            <div class="gantt-track">
                <div class="gantt-bar"
                style="left:${(t.start||0)*10}px;width:${(t.duration||10)*10}px"></div>
            </div>
        </div>
    `;
}

/* ================= RENDER ================= */
function render(page) {
    current = page;

    if(page==="dashboard") {
        const kk = kpi();
        content.innerHTML = `
            <div class="card"><h2>PMO Dashboard</h2></div>
            <div class="card">Site: ${site.length}</div>
            <div class="card">Tasks: ${tasks.length}</div>
            <div class="card">Issues: ${issues.length}</div>
            <div class="card">Close Rate: ${kk.rate}%</div>
        `;
    }

    else if(page==="site") {
        content.innerHTML = `
            <div class="card">
                <h2>Site Master</h2>
                <button onclick="addSite()">+ Site</button>
            </div>

            <div class="card">
                <table>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Client</th>
                        <th>Project</th>
                        <th>PM</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>

                    ${site.map(s=>`
                        <tr>
                            <td>${s.id}</td>
                            <td>${s.name||""}</td>
                            <td>${s.client||""}</td>
                            <td>${s.project||""}</td>
                            <td>${s.pm||""}</td>
                            <td>${s.status||""}</td>
                            <td>
                                <button onclick="updateSitetatus('${s.id}','진행')">진행</button>
                                <button onclick="updateSitetatus('${s.id}','보류')">보류</button>
                                <button onclick="updateSitetatus('${s.id}','완료')">완료</button>
                            </td>
                        </tr>
                    `).join("")}
                </table>
            </div>
        `;
    }

    else if(page==="project") {
        content.innerHTML = `
            <div class="card">
                <h2>Project</h2>
                <button onclick="addTask()">+ Task</button>
            </div>

            ${tasks.map(t=>`<div class="card">${t.name}</div>`).join("")}
        `;
    }

    else if(page==="gantt") {
        content.innerHTML = `
            <div class="card"><h2>Gantt</h2></div>
            <div class="card">
                ${tasks.map(ganttRow).join("")}
            </div>
        `;
    }

    else if(page==="issue") {
        content.innerHTML = `
            <div class="card">
                <h2>Issues</h2>
                <button onclick="addIssue()">+ Issue</button>
            </div>

            ${issues.map(i=>`
                <div class="card">${i.title}</div>
            `).join("")}
        `;
    }
}

/* ================= MENU ================= */
menu.forEach(m=>{
    m.onclick=()=>{
        menu.forEach(x=>x.classList.remove("active"));
        m.classList.add("active");
        render(m.dataset.page);
    };
});

/* INIT */
menu[0].classList.add("active");
render("dashboard");

</script>

</body>
</html>
