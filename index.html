<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project-Manager | PMO System</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f6f9}
.header{background:#1f2937;color:#fff;padding:15px;font-size:22px;font-weight:bold}
.container{display:flex}
.sidebar{width:240px;background:#374151;color:#fff;min-height:100vh;padding:15px}
.sidebar li{list-style:none;padding:10px;cursor:pointer}
.content{flex:1;padding:20px}
.card{background:#fff;padding:20px;border-radius:8px;margin-bottom:15px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
input,select,textarea{width:100%;padding:8px;margin:5px 0}
button{padding:10px 15px}
</style>
</head>
<body>
<div class="header">Project-Manager | PMO System</div>
<div class="container">
<div class="sidebar">
<ul>
<li onclick="showDashboard()">대시보드</li>
<li onclick="showProject()">프로젝트 관리</li>
<li onclick="showSchedule()">일정 관리</li>
<li onclick="showSupplier()">공급업체 관리</li>
<li onclick="showIssue()">이슈 관리</li>
</ul>
</div>
<div class="content" id="content"></div>
</div>
<script>
let projects=JSON.parse(localStorage.getItem('projects'))||[];

function save(){
 const p={
  name:projectName.value,
  customer:customer.value,
  pm:pm.value,
  status:status.value
 };
 projects.push(p);
 localStorage.setItem('projects',JSON.stringify(projects));
 showProject();
}

function showDashboard(){
 document.getElementById('content').innerHTML=`
 <div class="card">
 <h2>PM Dashboard</h2>
 <p>전체 프로젝트 : ${projects.length}</p>
 </div>`;
}

function showProject(){
 let rows='';
 projects.forEach(p=>rows+=`<tr><td>${p.name}</td><td>${p.customer}</td><td>${p.pm}</td><td>${p.status}</td></tr>`);
 document.getElementById('content').innerHTML=`
 <div class="card">
 <h2>프로젝트 등록</h2>
 <input id="projectName" placeholder="프로젝트명">
 <input id="customer" placeholder="고객사">
 <input id="pm" placeholder="PM">
 <select id="status"><option>정상</option><option>지연</option><option>위험</option></select>
 <button onclick="save()">등록</button>
 <table><tr><th>프로젝트</th><th>고객사</th><th>PM</th><th>상태</th></tr>${rows}</table>
 </div>`;
}

function showSchedule(){document.getElementById('content').innerHTML='<div class="card"><h2>일정 관리</h2><p>EVT / DVT / PVT / MP 관리 영역</p></div>';}
function showSupplier(){document.getElementById('content').innerHTML='<div class="card"><h2>공급업체 관리</h2><table><tr><th>업체</th><th>등급</th></tr><tr><td>LVSUN</td><td>A</td></tr></table></div>';}
function showIssue(){document.getElementById('content').innerHTML='<div class="card"><h2>이슈 관리</h2><p>PCB 번인, 안전재고 등 관리</p></div>';}

showDashboard();
</script>
</body>
</html>
