<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realtime PMO System</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#f4f6f9;
}

.sidebar {
    width:240px;
    background:#1e2a44;
    color:white;
    padding-top:20px;
}

.sidebar li {
    padding:14px 18px;
    cursor:pointer;
}
.sidebar li:hover { background:#2c3f66; }
.sidebar li.active { background:#00b894; }

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th, td {
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
}

th { background:#f1f2f6; }

button {
    padding:6px 10px;
    margin:2px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <ul>
        <li data-page="site">현장 마스터</li>
        <li data-page="intake">이슈 접수</li>
        <li data-page="workflow">워크플로우</li>
        <li data-page="log">로그</li>
    </ul>
</div>

<div class="content" id="content"></div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    updateDoc,
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* COLLECTIONS */
const sitesCol = collection(db, "sites");
const issuesCol = collection(db, "issues");

/* ================= STATE ================= */
let sites = [];
let issues = [];

const content = document.getElementById("content");
const menuItems = document.querySelectorAll(".sidebar li");

/* ================= REALTIME SYNC ================= */

/* 🔥 SITE REALTIME */
onSnapshot(sitesCol, (snap) => {
    sites = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render(currentPage);
});

/* 🔥 ISSUE REALTIME */
onSnapshot(issuesCol, (snap) => {
    issues = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render(currentPage);
});

/* ================= CREATE ================= */
window.addIssue = async function() {
    const title = prompt("이슈 제목");
    const site = sites[0]?.id;

    if(!title) return;

    await addDoc(issuesCol, {
        site,
        title,
        status:"New",
        log:[{ time:new Date().toLocaleString(), action:"Created" }]
    });
};

/* ================= UPDATE ================= */
window.move = async function(id, status) {
    const ref = doc(db, "issues", id);

    const issue = issues.find(i => i.id === id);

    await updateDoc(ref, {
        status,
        log:[...issue.log, {
            time:new Date().toLocaleString(),
            action:status
        }]
    });
};

/* ================= RENDER ================= */
let currentPage = "site";

function render(page) {
    currentPage = page;

    /* -------- SITE -------- */
    if(page === "site") {
        content.innerHTML = `
            <div class="card"><h2>🏗 현장 실시간 목록</h2></div>

            <table>
                <tr>
                    <th>ID</th><th>이름</th><th>상태</th>
                </tr>
                ${sites.map(s => `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name || "-"}</td>
                        <td>${s.status || "-"}</td>
                    </tr>
                `).join("")}
            </table>
        `;
    }

    /* -------- ISSUE -------- */
    else if(page === "intake") {
        content.innerHTML = `
            <div class="card">
                <h2>📥 이슈 접수 (Realtime)</h2>
                <button onclick="addIssue()">+ 이슈 추가</button>
            </div>

            <table>
                <tr><th>ID</th><th>현장</th><th>제목</th><th>상태</th></tr>
                ${issues.map(i => `
                    <tr>
                        <td>${i.id}</td>
                        <td>${i.site}</td>
                        <td>${i.title}</td>
                        <td>${i.status}</td>
                    </tr>
                `).join("")}
            </table>
        `;
    }

    /* -------- WORKFLOW -------- */
    else if(page === "workflow") {
        content.innerHTML = `
            <div class="card"><h2>🔄 실시간 워크플로우</h2></div>

            ${issues.map(i => `
                <div class="card">
                    <b>${i.title}</b><br/>
                    상태: ${i.status}<br/><br/>

                    <button onclick="move('${i.id}','Assigned')">Assign</button>
                    <button onclick="move('${i.id}','Analyzing')">Analyze</button>
                    <button onclick="move('${i.id}','Resolved')">Resolve</button>
                    <button onclick="move('${i.id}','Closed')">Close</button>
                </div>
            `).join("")}
        `;
    }

    /* -------- LOG -------- */
    else if(page === "log") {
        content.innerHTML = `
            <div class="card"><h2>🧾 실시간 로그</h2></div>

            ${issues.map(i => `
                <div class="card">
                    <b>${i.title}</b>
                    <pre>${JSON.stringify(i.log || [], null, 2)}</pre>
                </div>
            `).join("")}
        `;
    }
}

/* ================= MENU ================= */
menuItems.forEach(m => {
    m.addEventListener("click", () => {
        menuItems.forEach(i => i.classList.remove("active"));
        m.classList.add("active");
        render(m.dataset.page);
    });
});

/* INIT */
menuItems[0].classList.add("active");
render("site");

</script>

</body>
</html>
